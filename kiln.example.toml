# Kiln configuration — all values shown are defaults.
# Environment variables (KILN_*) override any value set here.
#
# Config file resolution order:
#   1. --config <path> CLI argument
#   2. KILN_CONFIG environment variable
#   3. ./kiln.toml in the current working directory
#   4. No file — built-in defaults

[server]
host = "0.0.0.0"
port = 8420
request_timeout_secs = 300
shutdown_timeout_secs = 30

[model]
# path = "/path/to/model"            # Required for real inference (omit for mock mode)
model_id = "Qwen/Qwen3.5-4B"
# tokenizer_path = "/path/to/tokenizer.json"
# adapter_dir = "/path/to/adapters"  # Default: <model_path>/adapters
# served_model_id = "qwen3.5-4b-kiln" # ID exposed at /v1/models and echoed in chat completion
                                      # responses. Default: derived from `model_id` by stripping
                                      # everything up to and including the last "/", lowercasing,
                                      # and appending "-kiln" (so "Qwen/Qwen3.5-4B" becomes
                                      # "qwen3.5-4b-kiln"). Override precedence:
                                      #   --served-model-id flag > KILN_SERVED_MODEL_ID env >
                                      #   this TOML value > derived default.
                                      #
                                      # GPTQ INT4 quantization: point `path` at a GPTQ model directory
                                      # containing quantize_config.json. Kiln auto-detects GPTQ and
                                      # dequantizes INT4 weights to BF16 during loading.

[memory]
# num_blocks = 256                   # KV cache blocks (auto-sized from VRAM if omitted)
# gpu_memory_gb = 24.0               # Override detected VRAM (for testing)
inference_memory_fraction = 0.7       # Fraction of VRAM for inference (rest for training)
# training_memory_gb = 4.0           # Override auto-calculated training budget
# kv_cache_fp8 = true                # FP8 (E4M3) KV cache quantization — halves memory, ~2x longer context
                                      # Also settable via KILN_KV_CACHE_FP8=1 env var

[training]
# grad_checkpoint_segments = 4       # Segments for gradient checkpointing
no_grad_checkpoint = false
# checkpoint_interval = 50           # Save adapter every N training steps
# webhook_url = "https://example.com/hook"  # POST training completion JSON to this URL.
                                              # Fields: job_id, job_type (sft|grpo),
                                              # status (completed|failed), adapter_name,
                                              # adapter_path, error, timestamp (RFC3339).
                                              # Fire-and-forget with a 5s timeout — webhook
                                              # failures are logged but do not affect job state.
                                              # Override via KILN_TRAINING_WEBHOOK_URL.

[logging]
level = "info"                        # trace, debug, info, warn, error, or a filter directive
format = "json"                       # json, pretty, text, human

[prefix_cache]
enabled = true                        # Reuse KV cache blocks for shared prompt prefixes
# max_blocks = 64                     # Max blocks for prefix cache (default: 25% of total)

[speculative]
enabled = false                       # Self-speculative decoding (skip-layer draft)
num_speculative_tokens = 4            # Tokens to draft per step (3-8 typical)
draft_layers = 8                      # First N layers used as draft model
                                      # Also settable via KILN_SPEC_ENABLED, KILN_SPEC_NUM_TOKENS,
                                      # KILN_SPEC_DRAFT_LAYERS env vars

[adapters]
max_disk_bytes = 107374182400         # 100 GiB cap on total finalized adapter_dir size.
                                      # Rejects POST /v1/adapters/upload with HTTP 507
                                      # `adapter_disk_quota_exceeded` when the sum of
                                      # finalized adapters + the just-extracted upload
                                      # would exceed this. `.upload-tmp-*/` and `.composed/`
                                      # are excluded (bounded separately).
                                      # Override via KILN_ADAPTERS_MAX_DISK_BYTES.
                                      # To disable the cap entirely, set the env var to 0
                                      # (or empty): `KILN_ADAPTERS_MAX_DISK_BYTES=0`.
composed_cache_max_bytes = 10737418240 # 10 GiB byte cap on the on-disk composed-adapter
                                      # cache at adapter_dir/.composed/<hash>/. Each unique
                                      # (name, scale) permutation in /v1/chat/completions
                                      # `adapters: [...]` writes a new merged adapter. After
                                      # a successful synthesize, oldest entries (by mtime) are
                                      # evicted until total bytes drop below this cap.
                                      # Override via KILN_ADAPTERS_COMPOSED_CACHE_MAX_BYTES.
                                      # Set to 0 (or empty) to disable the byte cap.
composed_cache_max_entries = 64       # Entry-count cap on the same composed-adapter cache.
                                      # Cheap independent guard against permutation loops with
                                      # tiny adapters that would not blow past the byte cap
                                      # quickly. Eviction order matches the byte cap (oldest
                                      # mtime first); cache hits refresh mtime so reuse counts
                                      # as recency. Override via
                                      # KILN_ADAPTERS_COMPOSED_CACHE_MAX_ENTRIES. Set to 0
                                      # (or empty) to disable the entry cap.

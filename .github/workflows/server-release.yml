name: Kiln server release

# Publishes prebuilt `kiln` server binaries on `kiln-v*` tags. The desktop
# app fetches from these releases to onboard users who don't want to build
# from source (see desktop/src/installer.rs and docs/desktop/signing.md).
#
# Platform matrix today:
#   - macOS aarch64 (Apple Silicon) + Metal feature — signed + notarized
#   - Linux x86_64 + CUDA 12.4 — unsigned prebuilt for NVIDIA GPUs
#   - Windows x86_64 + CUDA 12.4 — unsigned prebuilt for NVIDIA GPUs
#
# Linux + Windows jobs install the CUDA 12.4 toolkit on the runner via
# Jimver/cuda-toolkit and compile for SM 80/86/89/90 (Ampere → Hopper).
# Blackwell (SM 120) is not emitted because CUDA 12.4's nvcc does not
# support it; a CUDA 13 release will be needed once Blackwell GPUs are
# common enough in the user base to justify the extra build time.

on:
  push:
    tags:
      - "kiln-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-metal:
    name: macOS / aarch64 / Metal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: kiln-server-macos-metal

      - name: Build kiln (Metal)
        run: cargo build --release --locked --features metal --bin kiln --target aarch64-apple-darwin

      - name: Write App Store Connect API key to disk
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/appstore"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/appstore/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/appstore/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/appstore/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Create temp keychain and import Developer ID cert
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend our temp keychain to the search list so codesign can
          # find the identity; keep the login keychain present for the
          # system trust anchors.
          ORIG=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIG
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          # Allow codesign to use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign, notarize, and package kiln binary
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BIN="target/aarch64-apple-darwin/release/kiln"
          test -x "$BIN"

          # Sign with hardened runtime + timestamp so the binary can be notarized.
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"

          # notarytool accepts zip/pkg/dmg, not raw binaries. Submit a zip,
          # but ship a tar.gz (what Unix users expect). The notarization
          # ticket is cached server-side — stapling doesn't work on bare
          # binaries, but Gatekeeper will check online when the binary runs.
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/kiln"
          ditto -c -k --keepParent "$STAGE/kiln" "$RUNNER_TEMP/kiln-notarize.zip"

          echo "Submitting for notarization (this can take several minutes)..."
          xcrun notarytool submit "$RUNNER_TEMP/kiln-notarize.zip" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          # Package final tar.gz for distribution.
          VERSION="${TAG#kiln-v}"
          ARTIFACT="kiln-${VERSION}-aarch64-apple-darwin-metal.tar.gz"
          tar -czf "$ARTIFACT" -C "$STAGE" kiln
          shasum -a 256 "$ARTIFACT" | awk '{print $1}' > "$ARTIFACT.sha256"
          echo "Produced $ARTIFACT ($(wc -c < "$ARTIFACT") bytes, sha256=$(cat "$ARTIFACT.sha256"))"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ARTIFACT: ${{ env.ARTIFACT }}
        run: |
          set -euo pipefail
          # Create (or reuse) the release. Drafted so the author can review
          # before publishing; `gh release upload --clobber` works on drafts.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Kiln server $TAG" \
              --notes "Prebuilt \`kiln\` server binaries for $TAG. See the repository README for supported platforms.\n\nsupported_sm: [80, 86, 89, 90]\nmin_cuda: 12.4"
          fi
          gh release upload "$TAG" "$ARTIFACT" "$ARTIFACT.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload artifact (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/kiln-v')"
        uses: actions/upload-artifact@v4
        with:
          name: kiln-macos-aarch64-metal-unsigned
          path: target/aarch64-apple-darwin/release/kiln
          retention-days: 7

  linux-cuda:
    name: Linux / x86_64 / CUDA 12.4
    runs-on: ubuntu-22.04
    # Restrict nvcc to the GPU architectures we actually target: Ampere
    # (A100=80, A6000/RTX3090=86), Ada (RTX4090=89), and Hopper (H100=90).
    # Each extra arch adds a full compile pass per .cu file across the
    # flash-attn / marlin / gdn / rmsnorm / conv1d kernel crates, so
    # trimming the list to 4 arches keeps CI under ~30 min.
    env:
      KILN_CUDA_ARCHS: '80;86;89;90'
    steps:
      - name: Free disk space
        # The CUDA 12.4 toolkit (~5 GB installed) plus the cargo target dir
        # (~5 GB of CUDA kernel .so/.rlib artifacts) push up against the
        # default ~14 GB free on ubuntu-22.04 runners. Reclaim ~30 GB by
        # removing preinstalled toolchains we don't use (Android, .NET,
        # Haskell, CodeQL cache). Mirrors deploy/runpod/ runner hygiene.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install CUDA 12.4 toolkit
        # `method: network` downloads only the subpackages we ask for from
        # NVIDIA's apt repo (faster than the 4 GB local installer). The
        # -dev variants bring headers and import libs that kiln-flash-attn
        # / kiln-marlin-gemm / kiln-gdn-kernel need at link time.
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cudart-dev", "nvrtc", "nvrtc-dev", "cublas", "cublas-dev", "curand", "curand-dev", "cccl", "profiler-api"]'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: kiln-server-linux-cuda

      - name: Build kiln (CUDA)
        run: cargo build --release --locked --features cuda --bin kiln --target x86_64-unknown-linux-gnu

      - name: Package tarball
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BIN="target/x86_64-unknown-linux-gnu/release/kiln"
          test -x "$BIN"
          VERSION="${TAG#kiln-v}"
          ARTIFACT="kiln-${VERSION}-x86_64-unknown-linux-gnu-cuda124.tar.gz"
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/kiln"
          tar -czf "$ARTIFACT" -C "$STAGE" kiln
          sha256sum "$ARTIFACT" | awk '{print $1}' > "$ARTIFACT.sha256"
          echo "Produced $ARTIFACT ($(wc -c < "$ARTIFACT") bytes, sha256=$(cat "$ARTIFACT.sha256"))"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ARTIFACT: ${{ env.ARTIFACT }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Kiln server $TAG" \
              --notes "Prebuilt \`kiln\` server binaries for $TAG. See the repository README for supported platforms.\n\nsupported_sm: [80, 86, 89, 90]\nmin_cuda: 12.4"
          fi
          gh release upload "$TAG" "$ARTIFACT" "$ARTIFACT.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload artifact (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/kiln-v')"
        uses: actions/upload-artifact@v4
        with:
          name: kiln-linux-x86_64-cuda124-unsigned
          path: target/x86_64-unknown-linux-gnu/release/kiln
          retention-days: 7

  windows-cuda:
    name: Windows / x86_64 / CUDA 12.4
    runs-on: windows-latest
    # See linux-cuda for the rationale on the arch list. Blackwell (SM 120)
    # is excluded because CUDA 12.4's nvcc can't emit it.
    env:
      KILN_CUDA_ARCHS: '80;86;89;90'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install CUDA 12.4 toolkit
        # Same sub-package set as the Linux job. Jimver/cuda-toolkit
        # normalizes the hyphen/underscore naming across platforms, so
        # `cudart-dev` resolves to `cudart_dev` on the Windows network
        # installer automatically.
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.4.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cudart-dev", "nvrtc", "nvrtc-dev", "cublas", "cublas-dev", "curand", "curand-dev", "cccl", "profiler-api"]'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: kiln-server-windows-cuda

      - name: Build kiln (CUDA)
        shell: cmd
        run: |
          cargo build --release --locked --features cuda --bin kiln --target x86_64-pc-windows-msvc

      - name: Package zip
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = "target/x86_64-pc-windows-msvc/release/kiln.exe"
          if (!(Test-Path $bin)) { throw "Missing $bin" }
          $version = "$env:TAG".TrimStart("kiln-v")
          $artifact = "kiln-$version-x86_64-pc-windows-msvc-cuda124.zip"
          $stage = Join-Path $env:RUNNER_TEMP "stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath $bin -Destination (Join-Path $stage "kiln.exe") -Force
          # -CompressionLevel Optimal for the smallest tarball; Windows
          # users download these over potentially flaky networks.
          Compress-Archive -Path (Join-Path $stage "kiln.exe") -DestinationPath $artifact -CompressionLevel Optimal -Force
          $hash = (Get-FileHash -Algorithm SHA256 $artifact).Hash.ToLower()
          $hash | Out-File -FilePath "$artifact.sha256" -Encoding ascii -NoNewline
          $size = (Get-Item $artifact).Length
          Write-Host "Produced $artifact ($size bytes, sha256=$hash)"
          "ARTIFACT=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/kiln-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ARTIFACT: ${{ env.ARTIFACT }}
        run: |
          $ErrorActionPreference = 'Stop'
          gh release view "$env:TAG" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:TAG" `
              --repo "$env:GITHUB_REPOSITORY" `
              --draft `
              --title "Kiln server $env:TAG" `
              --notes "Prebuilt ``kiln`` server binaries for $env:TAG. See the repository README for supported platforms.\n\nsupported_sm: [80, 86, 89, 90]\nmin_cuda: 12.4"
          }
          gh release upload "$env:TAG" "$env:ARTIFACT" "$env:ARTIFACT.sha256" `
            --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Upload artifact (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/kiln-v')"
        uses: actions/upload-artifact@v4
        with:
          name: kiln-windows-x86_64-cuda124-unsigned
          path: target/x86_64-pc-windows-msvc/release/kiln.exe
          retention-days: 7

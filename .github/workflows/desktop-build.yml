name: Build kiln-desktop

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
    tags:
      - 'desktop-v*'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-14'
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop -> target'

      - name: Write App Store Connect API key to disk (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/desktop-v')
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/appstore"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/appstore/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/appstore/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/appstore/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization (macOS only — other
          # platforms ignore these). Without them, downloaded .dmgs trip
          # Gatekeeper with "Kiln Desktop is damaged and can't be opened."
          # tauri-action creates a temp keychain, imports the cert, signs
          # with hardened runtime, submits to notarytool, waits, and
          # staples the .app bundle automatically. A follow-up step below
          # notarizes and staples the .dmg wrapper, which tauri-action
          # does not handle.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_KEY_PATH is exported by the "Write ... key to disk" step above.
        with:
          projectPath: desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && github.ref_name || '' }}
          releaseName: 'Kiln Desktop ${{ startsWith(github.ref, ''refs/tags/desktop-v'') && github.ref_name || '''' }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Notarize + staple .dmg and re-upload (macOS)
        # tauri-action notarizes the .app bundle but not the .dmg wrapper, so
        # the uploaded .dmg is signed-but-not-notarized. Gatekeeper rejects it
        # on download ("Kiln Desktop is damaged") before the user ever reaches
        # the notarized .app inside. Fix: submit the .dmg to notarytool,
        # staple the ticket, replace the release asset. gh release upload
        # --clobber works on drafts, which is what tauri-action creates here.
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/desktop-v')
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG=$(ls desktop/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          echo "Notarizing $DMG..."
          xcrun notarytool submit "$DMG" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          echo "Stapling..."
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "Re-uploading notarized DMG to release (clobber)..."
          gh release upload "$GITHUB_REF_NAME" "$DMG" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Upload artifacts (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/desktop-v')"
        uses: actions/upload-artifact@v4
        with:
          name: kiln-desktop-${{ matrix.platform }}
          path: |
            desktop/target/release/bundle/deb/*.deb
            desktop/target/release/bundle/appimage/*.AppImage
            desktop/target/release/bundle/msi/*.msi
            desktop/target/release/bundle/nsis/*.exe
            desktop/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore
          retention-days: 14

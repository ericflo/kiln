name: Build kiln-runpod image

on:
  push:
    branches: [main]
    paths:
      - 'deploy/runpod/**'
      - '.github/workflows/runpod-image.yml'
  workflow_dispatch:
  schedule:
    # Weekly rebuild for security patches
    - cron: '0 8 * * 1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ericflo/kiln-runpod

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        # The CUDA dev base image (~10 GB) plus nsight-systems, Rust, and the
        # PyTorch cu124 wheel (~2.5 GB) overflow the default ~14 GB free space
        # on ubuntu-latest runners. Reclaim ~30 GB by removing preinstalled
        # tooling we don't need (Android SDK, .NET, Haskell, CodeQL, etc.).
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: deploy/runpod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

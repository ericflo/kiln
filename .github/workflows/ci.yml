name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  macos-metal:
    name: macOS / Metal (M-series)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch

      - name: Build (default features — no GPU)
        run: cargo build --locked

      - name: Build (Metal)
        run: cargo build --locked --features metal

      # Env-mutating tests are now serialized via an ENV_LOCK mutex inside
      # the test module, so they no longer race in parallel runs. The
      # `test_health_with_real_backend` skip remains because that test
      # depends on a live network backend and is intentionally excluded
      # from CI.
      - name: Test (default features — exercises CPU fallback)
        run: cargo test --locked -- --skip test_health_with_real_backend

      - name: Test (Metal feature — exercises Apple Silicon GPU path)
        # `--test-threads=1` because concurrent `Device::new_metal(0)` calls
        # panic in candle-metal 0.10.2's MetalDevice::new (`swap_remove` on
        # an empty vec).
        run: |
          cargo test --locked --features metal -- --test-threads=1 --skip test_health_with_real_backend

  linux-default:
    name: Linux / default features
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch

      - name: Build (default features — no CUDA)
        run: cargo build --locked

      - name: Test (default features)
        run: cargo test --locked -- --skip test_health_with_real_backend

  cargo-deny:
    name: cargo-deny (license / source / bans policy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      # Pin to an exact commit SHA so the bundled cargo-deny CLI version cannot
      # drift on us. v2.0.17 bundles cargo-deny 0.19.2, which is the version the
      # `unmaintained = "workspace"` Scope syntax in deny.toml is validated
      # against (cargo-deny ≤ 0.17 still parses that field as a deprecated
      # LintLevel and will reject "workspace"). Bump this pin deliberately when
      # we want a newer cargo-deny — see the README for the action.
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17 (cargo-deny 0.19.2)
        with:
          command: check
          # Run all checks: licenses, sources, bans, advisories
          arguments: --all-features

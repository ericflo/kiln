version: 2
updates:
  # Rust workspace dependencies
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions workflow dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(actions)"
      include: scope

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiln Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #388bfd;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }

/* Layout */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.header h1 {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.header-stats {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
  margin-left: auto;
  font-size: 13px;
}
.stat { display: flex; align-items: center; gap: 4px; }
.stat-label { color: var(--text2); }
.stat-val { font-family: var(--mono); font-weight: 500; }
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.ok { background: var(--green); }
.status-dot.degraded { background: var(--orange); }
.status-dot.offline { background: var(--red); }

.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px 20px;
  max-width: 1600px;
  margin: 0 auto;
}
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.panel-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
}
.panel-head h2 {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
}
.panel-body { padding: 14px; }

/* VRAM Bar */
.vram-bar-wrap { margin: 8px 0; }
.vram-bar {
  height: 20px;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  background: #21262d;
}
.vram-seg {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--bg);
  font-weight: 600;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
}
.vram-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text2);
}
.vram-legend span::before {
  content: '';
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
  margin-right: 4px;
  vertical-align: middle;
}
.vram-legend .model::before { background: var(--accent); }
.vram-legend .kv::before { background: var(--purple); }
.vram-legend .train::before { background: var(--orange); }
.vram-legend .free::before { background: #21262d; }

/* Scheduler stats */
.sched-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.sched-stat {
  background: var(--surface2);
  border-radius: 6px;
  padding: 8px 10px;
  text-align: center;
}
.sched-stat .num {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 600;
}
.sched-stat .lbl {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}

/* Adapter list */
.adapter-list { list-style: none; }
.adapter-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.adapter-item:last-child { border-bottom: none; }
.adapter-name {
  font-family: var(--mono);
  font-weight: 500;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.adapter-active {
  background: rgba(63, 185, 80, 0.15);
  border-radius: 4px;
}
.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 600;
  text-transform: uppercase;
}
.badge-active { background: rgba(63, 185, 80, 0.2); color: var(--green); }
.adapter-size {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
}
.adapter-actions { display: flex; gap: 4px; }

/* Buttons */
.btn {
  font-family: var(--sans);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { background: var(--border); }
.btn-sm { font-size: 11px; padding: 2px 8px; }
.btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-danger { color: var(--red); }
.btn-danger:hover { background: rgba(248, 81, 73, 0.15); }

/* Training queue */
.job-card {
  background: var(--surface2);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.job-card:last-child { margin-bottom: 0; }
.job-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.job-id {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
}
.job-state {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 600;
}
.job-state.Running { background: rgba(56, 139, 253, 0.2); color: var(--accent); }
.job-state.Queued { background: rgba(210, 153, 34, 0.2); color: var(--orange); }
.job-state.Completed { background: rgba(63, 185, 80, 0.2); color: var(--green); }
.job-state.Failed { background: rgba(248, 81, 73, 0.2); color: var(--red); }
.progress-bar {
  height: 4px;
  background: #21262d;
  border-radius: 2px;
  overflow: hidden;
  margin: 6px 0;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.job-meta {
  font-size: 11px;
  color: var(--text2);
  display: flex;
  gap: 12px;
}

/* Forms */
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
  font-weight: 500;
}
input[type="text"], input[type="number"], textarea, select {
  width: 100%;
  font-family: var(--mono);
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  outline: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
}
textarea { resize: vertical; min-height: 80px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Chat */
.chat-messages {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  min-height: 120px;
  max-height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.6;
}
.chat-msg { margin-bottom: 8px; }
.chat-msg .role {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.chat-msg.user .role { color: var(--green); }
.chat-msg.assistant .role { color: var(--accent); }
.chat-msg pre {
  font-family: var(--mono);
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-input-row {
  display: flex;
  gap: 8px;
}
.chat-input-row input {
  flex: 1;
}
.chat-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.chat-controls select { width: auto; }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  background: none;
  border-top: none; border-left: none; border-right: none;
  font-family: var(--sans);
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Empty state */
.empty {
  text-align: center;
  padding: 20px;
  color: var(--text2);
  font-size: 13px;
}

/* Recent Requests */
.recent-list {
  max-height: 320px;
  overflow-y: auto;
  list-style: none;
  margin: 0;
  padding: 0;
}
.recent-row {
  display: grid;
  grid-template-columns: 80px 1fr 140px;
  gap: 12px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  align-items: start;
}
.recent-row:last-child { border-bottom: none; }
.recent-time {
  font-family: var(--mono);
  color: var(--text2);
  white-space: nowrap;
}
.recent-previews { min-width: 0; }
.recent-prompt {
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--mono);
}
.recent-completion {
  color: var(--text);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.recent-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  color: var(--text2);
  font-family: var(--mono);
  white-space: nowrap;
}
.recent-meta .recent-tokens { color: var(--text); }
.recent-pill {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 10px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
  margin-right: 6px;
  vertical-align: middle;
}
.recent-pill.streamed { color: var(--accent); border-color: var(--accent); }
.recent-pill.timeout,
.recent-pill.error,
.recent-pill.client_disconnect { color: var(--orange); border-color: var(--orange); }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 13px;
  animation: fadeIn 0.2s;
  max-width: 360px;
}
.toast.ok { background: rgba(63, 185, 80, 0.9); color: #fff; }
.toast.err { background: rgba(248, 81, 73, 0.9); color: #fff; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <h1>kiln</h1>
  <div class="header-stats" id="header-stats">
    <span class="stat"><span class="status-dot offline" id="status-dot"></span><span class="stat-val" id="status-text">connecting...</span></span>
  </div>
</div>

<div class="main">
  <!-- Server Status -->
  <div class="panel">
    <div class="panel-head"><h2>Server Status</h2></div>
    <div class="panel-body" id="server-status">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <!-- Decode Performance -->
  <div class="panel">
    <div class="panel-head"><h2>Decode Performance</h2></div>
    <div class="panel-body" id="decode-perf-panel">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <!-- Recent Requests -->
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-head"><h2>Recent Requests</h2></div>
    <div class="panel-body" id="recent-requests-panel">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <!-- Adapters -->
  <div class="panel">
    <div class="panel-head">
      <h2>Adapters</h2>
    </div>
    <div class="panel-body" id="adapters-panel">
      <div class="empty">Loading...</div>
    </div>
    <div class="panel-body" style="border-top:1px solid var(--border);">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;font-weight:600;letter-spacing:0.5px;">Upload Adapter</div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:center;">
        <input type="text" id="upload-name" placeholder="adapter name">
        <input type="file" id="upload-archive" accept=".tar.gz,.tgz,application/gzip,application/x-gzip,application/x-tar" style="font-family:var(--sans);font-size:12px;">
        <button class="btn btn-primary" onclick="uploadAdapter()">Upload</button>
      </div>
    </div>
    <div class="panel-body" style="border-top:1px solid var(--border);">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;font-weight:600;letter-spacing:0.5px;">Merge Adapters</div>
      <div id="merge-sources" style="margin-bottom:6px;"></div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button type="button" class="btn btn-sm" onclick="addMergeSource()">+ Add source</button>
      </div>
      <div class="form-row" style="margin-bottom:8px;">
        <div class="form-group" style="margin-bottom:0;">
          <label>Output Name</label>
          <input type="text" id="merge-output-name" placeholder="merged-adapter">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>Mode</label>
          <select id="merge-mode" onchange="onMergeModeChange()">
            <option value="weighted_average">weighted_average</option>
            <option value="ties">ties</option>
            <option value="concat">concat</option>
          </select>
        </div>
      </div>
      <div class="form-group" id="merge-density-wrap" style="display:none;margin-bottom:8px;">
        <label>Density (TIES, in (0, 1])</label>
        <input type="number" id="merge-density" step="0.05" min="0.01" max="1" value="0.2">
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn btn-primary" onclick="mergeAdapters()">Merge</button>
      </div>
    </div>
  </div>

  <!-- Training -->
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-head"><h2>Training</h2></div>
    <div class="tabs">
      <button class="tab active" data-tab="queue">Queue</button>
      <button class="tab" data-tab="sft">Submit SFT</button>
      <button class="tab" data-tab="grpo">Submit GRPO</button>
    </div>
    <div class="panel-body">
      <div class="tab-content active" id="tab-queue">
        <div class="empty">Loading...</div>
      </div>
      <div class="tab-content" id="tab-sft">
        <form id="sft-form">
          <div class="form-row">
            <div class="form-group">
              <label>Adapter Name</label>
              <input type="text" name="output_name" value="sft-adapter" required>
            </div>
            <div class="form-group">
              <label>Epochs</label>
              <input type="number" name="num_epochs" value="3" min="1" max="100">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Learning Rate</label>
              <input type="text" name="learning_rate" value="0.0002">
            </div>
            <div class="form-group">
              <label>LoRA Rank</label>
              <input type="number" name="rank" value="8" min="1" max="128">
            </div>
          </div>
          <div class="form-group">
            <label>Training Examples (JSON array)</label>
            <textarea name="examples" rows="6" placeholder='[{"instruction":"Translate to French","input":"Hello","output":"Bonjour"}]'></textarea>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <label style="font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text2)">
              <input type="checkbox" name="auto_load" checked> Auto-load after training
            </label>
            <button type="submit" class="btn btn-primary" style="margin-left:auto">Submit SFT Job</button>
          </div>
        </form>
      </div>
      <div class="tab-content" id="tab-grpo">
        <form id="grpo-form">
          <div class="form-row">
            <div class="form-group">
              <label>Adapter Name</label>
              <input type="text" name="output_name" value="grpo-adapter" required>
            </div>
            <div class="form-group">
              <label>Epochs</label>
              <input type="number" name="num_epochs" value="1" min="1" max="100">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Learning Rate</label>
              <input type="text" name="learning_rate" value="0.00005">
            </div>
            <div class="form-group">
              <label>LoRA Rank</label>
              <input type="number" name="rank" value="8" min="1" max="128">
            </div>
          </div>
          <div class="form-group">
            <label>GRPO Groups (JSON array)</label>
            <textarea name="groups" rows="6" placeholder='[{"prompt":"Write a haiku","completions":[{"text":"Silent moonlit night...","reward":0.9},{"text":"The cat sat...","reward":0.2}]}]'></textarea>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <label style="font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text2)">
              <input type="checkbox" name="auto_load" checked> Auto-load after training
            </label>
            <button type="submit" class="btn btn-primary" style="margin-left:auto">Submit GRPO Job</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Quick Inference -->
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-head"><h2>Quick Inference</h2></div>
    <div class="panel-body">
      <div class="chat-controls">
        <label style="font-size:12px;color:var(--text2)">Adapter:</label>
        <select id="chat-adapter" style="width:180px;">
          <option value="">Base Model</option>
        </select>
        <label style="font-size:12px;color:var(--text2);margin-left:8px;">Temp:</label>
        <input type="number" id="chat-temp" value="0.0" min="0" max="2" step="0.1" style="width:70px;">
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Type a message...">
        <button class="btn btn-primary" id="chat-send">Send</button>
        <button class="btn" id="chat-clear">Clear</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
(function() {
'use strict';

// --- Toast Notifications ---
function toast(msg, type) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'ok');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// --- API Helpers ---
async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.detail || body.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    tab.closest('.panel').querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
    tab.closest('.panel').querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === 'tab-' + target));
  });
});

// --- Formatting ---
function fmtBytes(b) {
  if (b == null) return '-';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}
function fmtGb(gb) {
  if (gb == null) return '-';
  return gb.toFixed(1) + ' GB';
}
function fmtDuration(secs) {
  if (secs == null) return '-';
  secs = Math.floor(secs);
  if (secs < 60) return secs + 's';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h + 'h ' + m + 'm';
}

// --- Health Polling ---
let lastHealth = null;

async function pollHealth() {
  try {
    const h = await api('/health');
    lastHealth = h;
    renderHeader(h);
    renderServerStatus(h);
  } catch (e) {
    document.getElementById('status-dot').className = 'status-dot offline';
    document.getElementById('status-text').textContent = 'offline';
  }
}

function renderHeader(h) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + (h.status === 'ok' ? 'ok' : 'degraded');
  txt.textContent = h.status;

  const stats = document.getElementById('header-stats');
  stats.innerHTML = `
    <span class="stat"><span class="status-dot ${h.status === 'ok' ? 'ok' : 'degraded'}"></span><span class="stat-val">${h.status}</span></span>

// --- Recent Requests ---
let recentRequestsCache = [];

function fmtRelTime(unixMs) {
  if (!unixMs) return '-';
  const now = Date.now();
  const delta = Math.max(0, Math.round((now - unixMs) / 1000));
  if (delta < 1) return 'now';
  if (delta < 60) return delta + 's ago';
  if (delta < 3600) return Math.floor(delta / 60) + 'm ago';
  if (delta < 86400) return Math.floor(delta / 3600) + 'h ago';
  return Math.floor(delta / 86400) + 'd ago';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function apiFailureHtml(action, e) {
  return `<div class="empty">
    <div style="font-weight:600;color:var(--text);margin-bottom:6px;">Dashboard is waiting for Kiln server APIs.</div>
    <div>${escapeHtml(action)} could not load yet. If this is a cold start, wait for <code>kiln serve</code> to finish model startup, then refresh this panel.</div>
    <div style="margin-top:8px;">If it keeps failing, check the server logs for startup, model-path, or GPU initialization errors.</div>
    <div style="margin-top:8px;font-family:var(--mono);font-size:12px;">Details: ${escapeHtml(e.message)}</div>
  </div>`;
}

function renderRecentRequests(rows) {
  const el = document.getElementById('recent-requests-panel');
  if (!el) return;
  if (!rows || rows.length === 0) {
    el.innerHTML = '<div class="empty">No requests yet — try Quick Inference below</div>';
    return;
  }
  const items = rows.map(r => {
    const finish = r.finish_reason || 'stop';
    const finishClass = finish.replace(/[^a-z_]/gi, '_');
    const streamPill = r.streamed ? '<span class="recent-pill streamed">stream</span>' : '';
    const finishPill = `<span class="recent-pill ${finishClass}">${escapeHtml(finish)}</span>`;
    const tokens = `${r.prompt_tokens || 0} → ${r.completion_tokens || 0} tok`;
    const dur = (r.duration_ms != null) ? `${r.duration_ms} ms` : '';
    const promptText = r.prompt_preview || '—';
    const completionText = r.completion_preview || '—';
    return `
      <li class="recent-row" data-ts="${r.timestamp_unix_ms || 0}">
        <div class="recent-time">${fmtRelTime(r.timestamp_unix_ms)}</div>
        <div class="recent-previews">
          <div class="recent-prompt" title="${escapeHtml(promptText)}">${streamPill}${escapeHtml(promptText)}</div>
          <div class="recent-completion" title="${escapeHtml(completionText)}">${escapeHtml(completionText)}</div>
        </div>
        <div class="recent-meta">
          <span class="recent-tokens">${tokens}</span>
          <span>${finishPill}${escapeHtml(dur)}</span>
        </div>
      </li>
    `;
  }).join('');
  el.innerHTML = `<ul class="recent-list">${items}</ul>`;
}

function refreshRecentTimes() {
  const el = document.getElementById('recent-requests-panel');
  if (!el) return;
  el.querySelectorAll('.recent-row').forEach(row => {
    const ts = Number(row.dataset.ts || 0);
    if (!ts) return;
    const tcell = row.querySelector('.recent-time');
    if (tcell) tcell.textContent = fmtRelTime(ts);
  });
}

async function pollRecentRequests() {
  try {
    const data = await api('/v1/stats/recent-requests');
    recentRequestsCache = Array.isArray(data) ? data : [];
    renderRecentRequests(recentRequestsCache);
  } catch (e) {
    const el = document.getElementById('recent-requests-panel');
    if (el) el.innerHTML = apiFailureHtml('Recent requests', e);
  }
}

function renderAdapters(data) {

      <div style="font-weight:600;color:var(--text);margin-bottom:6px;">No adapters found yet.</div>

function updateAdapterSelect(data) {
  const sel = document.getElementById('chat-adapter');
  const current = sel.value;
  sel.innerHTML = '<option value="">Base Model</option>';
  if (data.available) {
    data.available.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.name;
      opt.textContent = a.name + (data.active === a.name ? ' (active)' : '');
      sel.appendChild(opt);
    });

  sel.value = current;

window.loadAdapter = async function(name) {
  try {
    await api('/v1/adapters/load', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
    toast('Loaded adapter: ' + name);

};

window.unloadAdapter = async function() {

    pollHealth();
  } catch (e) { toast(e.message, 'err'); }
};

window.deleteAdapter = async function(name) {
  if (!confirm('Delete adapter "' + name + '"? This cannot be undone.')) return;
  try {
    await api('/v1/adapters/' + encodeURIComponent(name), { method: 'DELETE' });
    toast('Deleted adapter: ' + name);
    pollAdapters();
  } catch (e) { toast(e.message, 'err'); }
};

window.downloadAdapter = function(name) {
  // Browser saves the response via Content-Disposition: attachment.
  window.location.href = '/v1/adapters/' + encodeURIComponent(name) + '/download';
};

window.uploadAdapter = async function() {
  const nameEl = document.getElementById('upload-name');
  const fileEl = document.getElementById('upload-archive');
  const name = nameEl.value.trim();
  const file = fileEl.files[0];
  if (!name) { toast('Adapter name is required', 'err'); return; }
  if (!file) { toast('Choose a .tar.gz archive', 'err'); return; }
  const fd = new FormData();
  fd.append('name', name);
  fd.append('archive', file);
  try {
    // NOTE: do not set Content-Type — the browser sets the multipart boundary.
    const res = await fetch('/v1/adapters/upload', { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    toast(`Uploaded ${data.name} (${fmtBytes(data.size_bytes)}, ${data.files} files)`);
    nameEl.value = '';
    fileEl.value = '';
    pollAdapters();
  } catch (e) { toast(e.message, 'err'); }
};

// --- Adapter Merge ---
let mergeSourceCount = 2;

function renderMergeSources() {
  const list = document.getElementById('merge-sources');
  if (!list) return;
  // Preserve current values across re-renders.
  const existing = Array.from(list.querySelectorAll('.merge-source')).map(row => ({
    name: row.querySelector('.merge-src-name').value,
    weight: row.querySelector('.merge-src-weight').value,
  }));
  const adapterOptions = (lastAdapters && lastAdapters.available || [])
    .map(a => `<option value="${escapeHtml(a.name)}">${escapeHtml(a.name)}</option>`)
    .join('');
  let html = '';
  for (let i = 0; i < mergeSourceCount; i++) {
    const sel = existing[i] ? existing[i].name : '';
    const w = existing[i] ? existing[i].weight : '0.5';
    html += `<div class="merge-source" style="display:grid;grid-template-columns:1fr 90px auto;gap:6px;margin-bottom:6px;align-items:center;">
      <select class="merge-src-name"><option value="">(select adapter)</option>${adapterOptions}</select>
      <input type="number" class="merge-src-weight" step="0.05" value="${w}">
      <button type="button" class="btn btn-sm btn-danger" onclick="removeMergeSource(${i})" ${mergeSourceCount <= 1 ? 'disabled' : ''}>−</button>
    </div>`;
  }
  list.innerHTML = html;
  // Re-apply preserved selections after innerHTML replacement.
  Array.from(list.querySelectorAll('.merge-source')).forEach((row, i) => {
    if (existing[i]) row.querySelector('.merge-src-name').value = existing[i].name;
  });
}

window.addMergeSource = function() { mergeSourceCount += 1; renderMergeSources(); };
window.removeMergeSource = function(idx) {
  if (mergeSourceCount <= 1) return;
  // Drop the row at idx by reading current values, removing it, then re-rendering.
  const list = document.getElementById('merge-sources');
  const rows = Array.from(list.querySelectorAll('.merge-source'));
  const kept = rows.filter((_, i) => i !== idx).map(row => ({
    name: row.querySelector('.merge-src-name').value,
    weight: row.querySelector('.merge-src-weight').value,
  }));
  mergeSourceCount = Math.max(1, kept.length);
  renderMergeSources();
  // Re-apply preserved values to the freshly rendered rows.
  const newRows = list.querySelectorAll('.merge-source');
  kept.forEach((v, i) => {
    if (!newRows[i]) return;
    newRows[i].querySelector('.merge-src-name').value = v.name;
    newRows[i].querySelector('.merge-src-weight').value = v.weight;
  });
};

window.onMergeModeChange = function() {
  const mode = document.getElementById('merge-mode').value;
  const densityWrap = document.getElementById('merge-density-wrap');
  if (densityWrap) densityWrap.style.display = (mode === 'ties') ? '' : 'none';
};

window.mergeAdapters = async function() {
  const list = document.getElementById('merge-sources');
  const rows = Array.from(list.querySelectorAll('.merge-source'));
  const sources = [];
  for (const row of rows) {
    const name = row.querySelector('.merge-src-name').value.trim();
    const weight = parseFloat(row.querySelector('.merge-src-weight').value);
    if (!name) { toast('Each merge source needs an adapter', 'err'); return; }
    if (!Number.isFinite(weight)) { toast('Each merge source needs a numeric weight', 'err'); return; }
    sources.push({ name, weight });
  }
  if (sources.length === 0) { toast('Add at least one source', 'err'); return; }
  const outputName = document.getElementById('merge-output-name').value.trim();
  if (!outputName) { toast('Output name is required', 'err'); return; }
  const mode = document.getElementById('merge-mode').value;
  const body = { sources, output_name: outputName, mode };
  if (mode === 'ties') {
    const d = parseFloat(document.getElementById('merge-density').value);
    if (!Number.isFinite(d) || d <= 0 || d > 1) { toast('Density must be in (0, 1]', 'err'); return; }
    body.density = d;
  }
  try {
    const res = await api('/v1/adapters/merge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    toast(`Merged ${res.sources.length} sources → ${res.output_name} (${res.num_tensors} tensors, mode=${res.mode})`);
    pollAdapters();
  } catch (e) { toast(e.message, 'err'); }
};

function renderTrainingQueue(data) {
  const el = document.getElementById('tab-queue');
  let html = '';

  if (data.running) {
    const j = data.running;
    html += renderJobCard(j, true);
  }

  if (data.queued && data.queued.length > 0) {
    html += `<div style="font-size:11px;color:var(--text2);margin:10px 0 6px;text-transform:uppercase;font-weight:600;">Queued</div>`;
    data.queued.forEach(q => {
      html += `<div class="job-card">
        <div class="job-header">
          <span class="job-id">${q.job_id.slice(0, 8)}</span>
          <span class="job-state Queued">Queued</span>
        </div>
        <div class="job-meta">
          <span>Type: ${q.job_type}</span>
          <span>Adapter: ${q.adapter_name}</span>
          <span>Position: #${q.position}</span>
        </div>
        <div style="margin-top:6px"><button class="btn btn-sm btn-danger" onclick="cancelJob('${q.job_id}')">Cancel</button></div>
      </div>`;
    });
  }

  if (data.completed && data.completed.length > 0) {
    html += `<div style="font-size:11px;color:var(--text2);margin:10px 0 6px;text-transform:uppercase;font-weight:600;">Recent</div>`;
    data.completed.slice(0, 5).forEach(j => {
      html += renderJobCard(j, false);
    });
  }

  if (!html) {
    html = `<div class="empty">
      <div style="font-weight:600;color:var(--text);margin-bottom:6px;">No training jobs yet.</div>
      <div>Submit SFT examples to teach the model a correction, or use Submit GRPO for scored completions and reward-driven updates.</div>
      <div style="margin-top:8px;">Until then, Quick Inference uses the Base Model or whichever adapter you load.</div>
    </div>`;
  }

  el.innerHTML = html;
}

function renderJobCard(j, isRunning) {
  const pct = ((j.progress || 0) * 100).toFixed(0);
  return `<div class="job-card">
    <div class="job-header">
      <span class="job-id">${j.job_id.slice(0, 8)}</span>
      <span class="job-state ${j.state}">${j.state}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="job-meta">
      <span>Progress: ${pct}%</span>
      ${j.current_loss != null ? `<span>Loss: ${j.current_loss.toFixed(4)}</span>` : ''}
      ${j.adapter_name ? `<span>Adapter: ${j.adapter_name}</span>` : ''}
      <span>Elapsed: ${fmtDuration(j.elapsed_secs)}</span>
    </div>
    ${isRunning ? `<div style="margin-top:6px"><button class="btn btn-sm btn-danger" onclick="cancelJob('${j.job_id}')">Cancel</button></div>` : ''}
  </div>`;
}

function formatQuickInferenceError(error) {
  const message = error?.message || String(error || 'Unknown error');
  return [
    '',
    'Quick Inference could not complete this request.',
    `Server error: ${message}`,
    '',
    'Next steps:',
    '1. If kiln serve just started, wait for model startup to finish and try again.',
    '2. Open /health to check whether the server is ready.',
    '3. Check the kiln serve logs for model path or GPU initialization errors.',
    '4. See Troubleshooting: https://ericflo.github.io/kiln/troubleshooting.html',
  ].join('\n');
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  chatMessages.push({ role: 'user', content: msg });
  chatMessages.push({ role: 'assistant', content: '' });
  renderChat();

  const adapter = document.getElementById('chat-adapter').value || undefined;
  const parsedTemp = parseFloat(document.getElementById('chat-temp').value);
  const temp = Number.isFinite(parsedTemp) ? parsedTemp : 0.0;

  const body = {
    messages: chatMessages.filter(m => m.content).map(m => ({ role: m.role, content: m.content })),
    stream: true,
    temperature: temp,
    max_tokens: 1024,
  };
  if (servedModelId) body.model = servedModelId;
  if (adapter) body.adapter = adapter;

  try {
    if (chatAbort) chatAbort.abort();
    chatAbort = new AbortController();

    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: chatAbort.signal,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || err.error || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') break;
        try {
          const chunk = JSON.parse(payload);
          const delta = chunk.choices?.[0]?.delta;
          if (delta?.content) {
            chatMessages[chatMessages.length - 1].content += delta.content;
            renderChat();
          }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      chatMessages[chatMessages.length - 1].content += formatQuickInferenceError(e);
      renderChat();
    }
  }
  chatAbort = null;
}

document.getElementById('chat-send').addEventListener('click', sendChat);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.getElementById('chat-clear').addEventListener('click', () => {
  if (chatAbort) { chatAbort.abort(); chatAbort = null; }
  chatMessages.length = 0;
  renderChat();
});

// --- Init ---
renderChat();
pollHealth();
pollAdapters();
pollTraining();
pollDecodePerf();
pollRecentRequests();

setInterval(pollHealth, 2000);
setInterval(pollAdapters, 5000);
setInterval(pollTraining, 3000);
setInterval(pollDecodePerf, 2000);
setInterval(pollRecentRequests, 2000);
// Refresh relative timestamps every second without re-fetching the list.
setInterval(refreshRecentTimes, 1000);

})();
</script>

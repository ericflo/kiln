<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>About Kiln Desktop</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0f1115;
        color: #e6e6e6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .wrap {
        flex: 1 1 auto;
        padding: 24px 28px 16px 28px;
        box-sizing: border-box;
        overflow-y: auto;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px 0;
        color: #f0f2f6;
      }
      .version {
        color: #a8aeb8;
        font-size: 13px;
        margin: 0 0 18px 0;
        font-variant-numeric: tabular-nums;
      }
      p.desc {
        color: #cfd3da;
        font-size: 13px;
        line-height: 1.55;
        margin: 0 0 14px 0;
      }
      .meta {
        color: #a8aeb8;
        font-size: 12px;
        line-height: 1.6;
        margin: 14px 0 0 0;
      }
      .meta a {
        color: #5f9bff;
        text-decoration: none;
      }
      .meta a:hover {
        text-decoration: underline;
      }
      footer {
        flex: 0 0 auto;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 10px 14px;
        background: #161922;
        border-top: 1px solid #232733;
      }
      button {
        background: #2a6df4;
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 12px;
        cursor: pointer;
      }
      button:hover { background: #3b7af5; }
      button.secondary {
        background: #232733;
        color: #e6e6e6;
      }
      button.secondary:hover { background: #2c313f; }
      .platform {
        color: #a8aeb8;
        font-size: 12px;
        margin: 0 0 18px 0;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Kiln Desktop</h1>
      <p class="version">Version <span id="version">…</span></p>
      <p class="platform">OS: <span id="platform">…</span></p>
      <p class="desc">
        System tray app for the kiln local LLM server. Spawns and supervises
        the kiln binary, exposes status and settings, and surfaces the
        OpenAI-compatible base URL.
      </p>
      <p class="meta">
        Repository:
        <a id="repo-link" href="https://github.com/ericflo/kiln" target="_blank" rel="noopener noreferrer">github.com/ericflo/kiln</a>
      </p>
      <p class="meta">Licensed under MIT.</p>
      <p class="meta">Built with Tauri.</p>
    </div>
    <footer>
      <button id="copy-diag" class="secondary" type="button" title="Copy version + OS info to clipboard">Copy diagnostic info</button>
      <button id="close" type="button" title="Close (Esc)">Close</button>
    </footer>
    <script defer>
      const invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)
        || (window.__TAURI__ && window.__TAURI__.invoke);

      const versionEl = document.getElementById("version");
      const platformEl = document.getElementById("platform");
      const diag = {
        version: "unknown",
        os: "unknown",
        arch: "unknown",
        kiln_binary: "",
        model_path: "",
        server_state: "",
      };

      function renderDiag() {
        versionEl.textContent = diag.version;
        platformEl.textContent = `${diag.os} (${diag.arch})`;
      }

      if (invoke) {
        invoke("get_diagnostic_info").then((d) => {
          if (d && typeof d === "object") {
            if (d.version) diag.version = d.version;
            if (d.os) diag.os = d.os;
            if (d.arch) diag.arch = d.arch;
            if (d.kiln_binary) diag.kiln_binary = d.kiln_binary;
            if (d.model_path) diag.model_path = d.model_path;
            if (d.server_state) diag.server_state = d.server_state;
          }
          renderDiag();
        }).catch(() => {
          invoke("get_app_version").then((v) => {
            if (v) diag.version = v;
            renderDiag();
          }).catch(renderDiag);
        });
      } else {
        renderDiag();
      }

      const repoLink = document.getElementById("repo-link");
      repoLink.addEventListener("click", (e) => {
        const shell = window.__TAURI__ && window.__TAURI__.shell;
        if (shell && typeof shell.open === "function") {
          e.preventDefault();
          shell.open(repoLink.href).catch(() => {});
        }
      });

      const copyBtn = document.getElementById("copy-diag");
      const COPY_LABEL = "Copy diagnostic info";
      let copyResetTimer = null;
      function flashCopy(label) {
        if (copyResetTimer) clearTimeout(copyResetTimer);
        copyBtn.textContent = label;
        copyResetTimer = setTimeout(() => {
          copyBtn.textContent = COPY_LABEL;
          copyResetTimer = null;
        }, 1200);
      }
      copyBtn.addEventListener("click", async () => {
        const text = [
          `Kiln Desktop v${diag.version}`,
          `OS: ${diag.os} (${diag.arch})`,
          `Server: ${diag.server_state || "unknown"}`,
          `Kiln binary: ${diag.kiln_binary || "(not resolved)"}`,
          `Model path: ${diag.model_path || "(not set)"}`,
        ].join("\n");
        try {
          await navigator.clipboard.writeText(text);
          flashCopy("Copied!");
        } catch (err) {
          flashCopy("Copy failed");
          console.error("clipboard.writeText failed", err);
        }
      });

      const closeBtn = document.getElementById("close");
      function closeWindow() {
        // Tauri v2: webview windows expose close() via getCurrentWebviewWindow.
        // Fall back across a couple of namespace shapes since different
        // tauri versions / withGlobalTauri flags expose different globals.
        const webview = window.__TAURI__ && window.__TAURI__.webviewWindow;
        const windowNs = window.__TAURI__ && window.__TAURI__.window;
        const getter =
          (webview && typeof webview.getCurrentWebviewWindow === "function" && webview.getCurrentWebviewWindow) ||
          (windowNs && typeof windowNs.getCurrentWindow === "function" && windowNs.getCurrentWindow) ||
          null;
        const cur = getter ? getter() : null;
        if (cur && typeof cur.close === "function") {
          cur.close();
        } else {
          window.close();
        }
      }
      closeBtn.addEventListener("click", closeWindow);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          e.preventDefault();
          closeWindow();
          return;
        }
        const mod = e.metaKey || e.ctrlKey;
        if (!mod) return;
        const lower = typeof e.key === "string" ? e.key.toLowerCase() : "";
        if (lower === "w" || lower === "s") {
          e.preventDefault();
          closeWindow();
        }
      });
    </script>
  </body>
</html>

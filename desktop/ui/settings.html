<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kiln Settings</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0f1115;
        color: #e6e6e6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap { padding: 24px; max-width: 520px; box-sizing: border-box; }
      h1 { font-size: 18px; margin: 0 0 16px 0; font-weight: 600; }
      fieldset {
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        padding: 12px 16px 16px 16px;
        margin: 0 0 16px 0;
      }
      legend { padding: 0 6px; color: #a8aeb8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      label.row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        padding: 6px 0;
        font-size: 13px;
      }
      label.row > span.name { color: #cfd3da; }
      label.row > span.hint {
        display: block;
        flex-basis: 100%;
        font-size: 12px;
        color: #6c7280;
        margin: 2px 0 0 0;
        font-weight: normal;
        line-height: 1.35;
      }
      label.row > input[type="text"],
      label.row > input[type="number"] {
        background: #181b21;
        color: #e6e6e6;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 13px;
        width: 260px;
        box-sizing: border-box;
      }
      label.row > input[type="number"].small { width: 100px; }
      .path-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .path-row > input[type="text"] {
        width: 204px;
      }
      button.browse {
        background: #2a2f3a;
        color: #e6e6e6;
        border: 1px solid #3a4050;
        border-radius: 4px;
        padding: 3px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      button.browse:hover { background: #343a46; }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 8px;
      }
      button {
        background: #2f66f0;
        color: #fff;
        border: 0;
        border-radius: 4px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary { background: #2a2f3a; }
      button:disabled { opacity: 0.5; cursor: default; }
      button#save:disabled { opacity: 0.55; cursor: default; background: #1f3a78; }
      .status { margin-top: 8px; font-size: 12px; color: #7fbf7f; min-height: 16px; }
      .status.error { color: #f08080; }
      .todo { color: #a8aeb8; font-size: 11px; margin-top: 4px; }
      .version-footer { margin-top: 16px; color: #6c7280; font-size: 11px; text-align: right; }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-overlay.hidden {
        display: none !important;
      }
      .modal-card {
        background: #1b1e24;
        border: 1px solid #2a2f3a;
        border-radius: 8px;
        padding: 20px 24px;
        max-width: 420px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      }
      .modal-card header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 14px 0;
        padding: 0;
        background: transparent;
        border: 0;
      }
      .modal-card header h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: #e6e6e6;
        flex: 0 0 auto;
      }
      .modal-card header button#shortcuts-close {
        margin: 0;
        background: transparent;
        color: #a8aeb8;
        border: 0;
        padding: 0 4px;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }
      .modal-card header button#shortcuts-close:hover {
        color: #e6e6e6;
        background: transparent;
      }
      .modal-card dl {
        display: grid;
        grid-template-columns: 1fr auto;
        column-gap: 16px;
        row-gap: 10px;
        margin: 0;
        align-items: center;
      }
      .modal-card dt {
        color: #d8dbe2;
        font-size: 13px;
      }
      .modal-card dd {
        margin: 0;
        display: flex;
        gap: 4px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
      .modal-card kbd {
        display: inline-block;
        background: #0f1115;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 2px 6px;
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        color: #e6e6e6;
        line-height: 1;
      }
      .modal-card p.hint {
        margin: 14px 0 0 0;
        color: #6c7280;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Kiln Settings</h1>

      <fieldset>
        <legend>Server</legend>
        <label class="row"><span class="name">Kiln binary</span>
          <span class="path-row">
            <input type="text" id="kiln_binary" placeholder="(use PATH)" />
            <button type="button" class="browse" id="pick_kiln_binary">Browse</button>
          </span>
          <span class="hint">Leave blank to use kiln on PATH. Otherwise pick the kiln executable.</span>
        </label>
        <label class="row"><span class="name">Model path</span>
          <span class="path-row">
            <input type="text" id="model_path" placeholder="/path/to/model" />
            <button type="button" class="browse" id="pick_model_path">Browse</button>
          </span>
          <span class="hint">Directory containing the Qwen3.5-4B weights.</span>
        </label>
        <label class="row"><span class="name">Host</span>
          <input type="text" id="host" />
          <span class="hint">IP address to bind on. 127.0.0.1 for local only, 0.0.0.0 for LAN.</span>
        </label>
        <label class="row"><span class="name">Port</span>
          <input type="number" class="small" id="port" min="1" max="65535" />
          <span class="hint">TCP port for the OpenAI-compatible API.</span>
        </label>
        <label class="row"><span class="name">Adapter directory</span>
          <span class="path-row">
            <input type="text" id="adapter_dir" placeholder="/path/to/adapters" />
            <button type="button" class="browse" id="pick_adapter_dir">Browse</button>
          </span>
          <span class="hint">Where LoRA adapters are saved and loaded from.</span>
        </label>
      </fieldset>

      <fieldset>
        <legend>Memory &amp; performance</legend>
        <label class="row"><span class="name">Inference fraction (0..1)</span>
          <input type="number" class="small" id="inference_fraction" min="0" max="1" step="0.05" />
          <span class="hint">Fraction of free VRAM reserved for inference. Rest is available for training.</span>
        </label>
        <label class="row"><span class="name">FP8 KV cache</span>
          <input type="checkbox" id="fp8_kv_cache" />
          <span class="hint">Halves KV cache VRAM with minor quality impact. Recommended on.</span>
        </label>
        <label class="row"><span class="name">CUDA graphs</span>
          <input type="checkbox" id="cuda_graphs" />
          <span class="hint">Replays fused GPU ops for faster decode. Recommended on.</span>
        </label>
        <label class="row"><span class="name">Prefix cache</span>
          <input type="checkbox" id="prefix_cache" />
          <span class="hint">Reuses computation for repeated prompt prefixes. Recommended on.</span>
        </label>
        <label class="row"><span class="name">Speculative decoding</span>
          <input type="checkbox" id="speculative_decoding" />
          <span class="hint">Uses a draft model to accelerate decoding. Experimental.</span>
        </label>
      </fieldset>

      <fieldset>
        <legend>Startup</legend>
        <label class="row"><span class="name">Auto-start kiln on app launch</span>
          <input type="checkbox" id="auto_start" />
          <span class="hint">Starts the kiln server automatically when this app opens.</span>
        </label>
        <label class="row"><span class="name">Auto-restart on crash</span>
          <input type="checkbox" id="auto_restart" />
          <span class="hint">Relaunches the kiln server with backoff if it exits unexpectedly.</span>
        </label>
        <label class="row"><span class="name">Launch at login</span>
          <input type="checkbox" id="launch_at_login" />
          <span class="hint">Opens Kiln Desktop automatically when you log in to your OS.</span>
        </label>
      </fieldset>

      <div class="actions">
        <button class="secondary" id="reload" title="Reload (Cmd/Ctrl+R)">Reload</button>
        <button class="secondary" id="restore-defaults" title="Reset all fields to defaults">Restore defaults</button>
        <button class="secondary" id="restart" hidden>Restart now</button>
        <button id="save" title="Save (Cmd/Ctrl+S)">Save</button>
      </div>
      <div class="status" id="status"></div>
      <div class="version-footer">Kiln Desktop v<span id="app-version">—</span></div>
    </div>

    <div id="shortcuts-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="shortcuts-title">
      <div class="modal-card">
        <header>
          <h2 id="shortcuts-title">Keyboard Shortcuts</h2>
          <button id="shortcuts-close" aria-label="Close">×</button>
        </header>
        <dl>
          <dt>Show this help</dt>
          <dd><kbd>?</kbd> or <kbd>Ctrl</kbd>+<kbd>/</kbd></dd>
          <dt>Close window</dt>
          <dd><kbd>Esc</kbd> or <kbd>Ctrl</kbd>+<kbd>W</kbd> (prompts if unsaved changes)</dd>
          <dt>Save settings</dt>
          <dd><kbd>Ctrl</kbd>+<kbd>S</kbd></dd>
          <dt>Reload settings</dt>
          <dd><kbd>Ctrl</kbd>+<kbd>R</kbd></dd>
        </dl>
        <p class="hint">Use Cmd in place of Ctrl on macOS. (Windows/Linux builds only today.)</p>
      </div>
    </div>

    <script>
      const invoke = window.__TAURI__.core.invoke;
      const dialog = window.__TAURI__.dialog;
      const statusEl = document.getElementById("status");
      const restartBtn = document.getElementById("restart");
      let lastSavedSnapshot = null;

      const fields = [
        "kiln_binary", "model_path", "host", "port",
        "inference_fraction", "fp8_kv_cache", "cuda_graphs",
        "prefix_cache", "speculative_decoding", "adapter_dir",
        "auto_start", "auto_restart", "launch_at_login",
      ];

      function readForm() {
        const n = (id) => document.getElementById(id);
        const strOrNull = (id) => {
          const v = n(id).value.trim();
          return v.length ? v : null;
        };
        return {
          kiln_binary: strOrNull("kiln_binary"),
          model_path: strOrNull("model_path"),
          host: n("host").value.trim() || "127.0.0.1",
          port: parseInt(n("port").value, 10) || 8000,
          inference_fraction: parseFloat(n("inference_fraction").value) || 0.9,
          fp8_kv_cache: n("fp8_kv_cache").checked,
          cuda_graphs: n("cuda_graphs").checked,
          prefix_cache: n("prefix_cache").checked,
          speculative_decoding: n("speculative_decoding").checked,
          adapter_dir: strOrNull("adapter_dir"),
          auto_start: n("auto_start").checked,
          auto_restart: n("auto_restart").checked,
          launch_at_login: n("launch_at_login").checked,
        };
      }

      function writeForm(s) {
        const n = (id) => document.getElementById(id);
        n("kiln_binary").value = s.kiln_binary || "";
        n("model_path").value = s.model_path || "";
        n("host").value = s.host || "";
        n("port").value = s.port ?? 8000;
        n("inference_fraction").value = s.inference_fraction ?? 0.9;
        n("fp8_kv_cache").checked = !!s.fp8_kv_cache;
        n("cuda_graphs").checked = !!s.cuda_graphs;
        n("prefix_cache").checked = !!s.prefix_cache;
        n("speculative_decoding").checked = !!s.speculative_decoding;
        n("adapter_dir").value = s.adapter_dir || "";
        n("auto_start").checked = !!s.auto_start;
        n("auto_restart").checked = !!s.auto_restart;
        n("launch_at_login").checked = !!s.launch_at_login;
      }

      async function pickPath(inputId, opts) {
        try {
          const result = await dialog.open(opts);
          if (typeof result === "string" && result.length) {
            document.getElementById(inputId).value = result;
            updateDirtyIndicator();
          }
        } catch (e) {
          setStatus("Pick failed: " + e, true);
        }
      }

      function isDirty() {
        if (lastSavedSnapshot === null) return false;
        return JSON.stringify(readForm()) !== lastSavedSnapshot;
      }

      function updateDirtyIndicator() {
        const dirty = isDirty();
        const btn = document.getElementById("save");
        btn.classList.toggle("dirty", dirty);
        btn.disabled = !dirty;
      }

      function setStatus(msg, err) {
        statusEl.textContent = msg;
        statusEl.className = err ? "status error" : "status";
      }

      function hideRestart() {
        restartBtn.hidden = true;
        restartBtn.disabled = false;
      }

      async function load() {
        try {
          const s = await invoke("get_settings");
          writeForm(s);
          lastSavedSnapshot = JSON.stringify(readForm());
          updateDirtyIndicator();
          hideRestart();
          setStatus("Loaded.");
        } catch (e) {
          setStatus("Failed to load: " + e, true);
        }
      }

      async function save() {
        try {
          await invoke("set_settings", { new: readForm() });
          lastSavedSnapshot = JSON.stringify(readForm());
          updateDirtyIndicator();
          let running = false;
          try {
            const state = await invoke("server_state");
            const kind = state && state.kind;
            running = kind === "Starting" || kind === "Running" || kind === "TrainingActive";
          } catch (e) {
            // If state lookup fails, fall back to the no-restart message.
          }
          if (running) {
            setStatus("Saved. Restart server to apply new settings.");
            restartBtn.hidden = false;
            restartBtn.disabled = false;
          } else {
            hideRestart();
            setStatus("Saved. New settings apply on next Start.");
          }
        } catch (e) {
          setStatus("Save failed: " + e, true);
        }
      }

      async function restart() {
        restartBtn.disabled = true;
        setStatus("Restarting…");
        try {
          await invoke("restart_server");
          hideRestart();
          setStatus("Restarted. New settings are now applied.");
        } catch (e) {
          restartBtn.disabled = false;
          setStatus("Restart failed: " + e, true);
        }
      }

      async function restoreDefaults() {
        if (!window.confirm("Reset all settings to defaults? You'll need to click Save to persist.")) {
          return;
        }
        try {
          const d = await invoke("default_settings");
          writeForm(d);
          updateDirtyIndicator();
          setStatus("Defaults loaded. Click Save to persist.");
        } catch (e) {
          setStatus("Restore failed: " + e, true);
        }
      }

      const reloadBtn = document.getElementById("reload");
      const saveBtn = document.getElementById("save");
      const restoreBtn = document.getElementById("restore-defaults");
      reloadBtn.addEventListener("click", load);
      saveBtn.addEventListener("click", save);
      restoreBtn.addEventListener("click", restoreDefaults);
      restartBtn.addEventListener("click", restart);

      const formContainer = document.querySelector(".wrap");
      formContainer.addEventListener("input", updateDirtyIndicator);
      formContainer.addEventListener("change", updateDirtyIndicator);

      function closeWindow() {
        if (isDirty() && !window.confirm("You have unsaved changes. Discard them and close?")) {
          return;
        }
        // Tauri v2: webview windows expose close() via getCurrentWebviewWindow.
        // Fall back across a couple of namespace shapes since different
        // tauri versions / withGlobalTauri flags expose different globals.
        const webview = window.__TAURI__ && window.__TAURI__.webviewWindow;
        const windowNs = window.__TAURI__ && window.__TAURI__.window;
        const getter =
          (webview && typeof webview.getCurrentWebviewWindow === "function" && webview.getCurrentWebviewWindow) ||
          (windowNs && typeof windowNs.getCurrentWindow === "function" && windowNs.getCurrentWindow) ||
          null;
        const cur = getter ? getter() : null;
        if (cur && typeof cur.close === "function") {
          cur.close();
        } else {
          window.close();
        }
      }

      const shortcutsModal = document.getElementById("shortcuts-modal");
      const shortcutsCloseBtn = document.getElementById("shortcuts-close");
      function openShortcutsModal() {
        shortcutsModal.classList.remove("hidden");
      }
      function closeShortcutsModal() {
        shortcutsModal.classList.add("hidden");
      }
      shortcutsCloseBtn.addEventListener("click", closeShortcutsModal);
      shortcutsModal.addEventListener("click", (e) => {
        if (e.target === shortcutsModal) closeShortcutsModal();
      });

      document.addEventListener("keydown", (e) => {
        const modalOpen = !shortcutsModal.classList.contains("hidden");
        if (modalOpen) {
          if (e.key === "Escape") {
            e.preventDefault();
            closeShortcutsModal();
          }
          return;
        }
        const target = e.target;
        const inInput = target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.isContentEditable || target.tagName === "SELECT");
        const mod = e.metaKey || e.ctrlKey;
        const shift = e.shiftKey;
        const key = e.key;
        const lower = typeof key === "string" ? key.toLowerCase() : "";
        if (!inInput && !mod && (key === "?" || (shift && key === "/"))) {
          e.preventDefault();
          openShortcutsModal();
          return;
        }
        if (!inInput && mod && !shift && key === "/") {
          e.preventDefault();
          openShortcutsModal();
          return;
        }
        if (e.key === "Escape") {
          const tag = target && target.tagName;
          if (tag !== "INPUT" && tag !== "TEXTAREA" && tag !== "SELECT") {
            e.preventDefault();
            closeWindow();
            return;
          }
        }
        if (!mod) return;
        if (!shift && lower === "w") {
          e.preventDefault();
          closeWindow();
        } else if (!shift && lower === "s") {
          e.preventDefault();
          if (!saveBtn.disabled) saveBtn.click();
        } else if (!shift && lower === "r") {
          e.preventDefault();
          if (!reloadBtn.disabled) reloadBtn.click();
        }
      });
      document.getElementById("pick_kiln_binary").addEventListener("click", () =>
        pickPath("kiln_binary", { multiple: false, directory: false, title: "Select kiln binary" })
      );
      document.getElementById("pick_model_path").addEventListener("click", () =>
        pickPath("model_path", { multiple: false, directory: false, title: "Select model file" })
      );
      document.getElementById("pick_adapter_dir").addEventListener("click", () =>
        pickPath("adapter_dir", { multiple: false, directory: true, title: "Select adapter directory" })
      );
      invoke("get_app_version").then(v => {
        document.getElementById("app-version").textContent = v;
      }).catch(() => {});
      load();
    </script>
  </body>
</html>

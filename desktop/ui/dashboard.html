<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kiln Dashboard</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0f1115;
        color: #e6e6e6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      #frame {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #0f1115;
      }
      #status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
        text-align: center;
        background: #0f1115;
      }
      #status h1 {
        font-size: 18px;
        margin: 0 0 8px 0;
        font-weight: 600;
      }
      #status p {
        margin: 4px 0;
        color: #a8aeb8;
        font-size: 14px;
        max-width: 440px;
      }
      #status code {
        background: #1b1e24;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
      button {
        margin-top: 16px;
        background: #2a6df4;
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover { background: #3b7af5; }
      button:disabled { background: #2a2f3a; cursor: default; }
      .hidden { display: none !important; }
      #status-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      #toolbar {
        position: absolute;
        top: 8px;
        right: 12px;
        display: flex;
        gap: 8px;
        z-index: 10;
      }
      #toolbar button {
        margin-top: 0;
        background: #1b1e24;
        color: #d8dbe2;
        border: 1px solid #2a2f3a;
        padding: 6px 10px;
        font-size: 12px;
      }
      #toolbar button:hover { background: #232831; }
      #copy-url.flash { background: #245a32; border-color: #2f7a43; color: #d6f2dd; }
      #copy-url.flash-warn { background: #5a3324; border-color: #7a432f; color: #f2ddd6; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="open-logs" title="Open the log viewer window">View Logs</button>
      <button id="open-settings" title="Open the settings window">Settings</button>
      <button id="copy-url" title="Copy the OpenAI-compatible base URL for this server">Copy OpenAI base URL</button>
    </div>
    <iframe id="frame" class="hidden" title="Kiln UI"></iframe>
    <div id="status">
      <h1 id="status-title">Connecting to Kiln server…</h1>
      <p id="status-detail">Looking up the server URL from your settings.</p>
      <div id="status-actions">
        <button id="start-server" class="hidden">Start Server</button>
        <button id="retry" class="hidden">Retry</button>
      </div>
    </div>
    <script>
      const invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)
        || (window.__TAURI__ && window.__TAURI__.invoke);

      const frame = document.getElementById("frame");
      const status = document.getElementById("status");
      const title = document.getElementById("status-title");
      const detail = document.getElementById("status-detail");
      const retry = document.getElementById("retry");
      const startBtn = document.getElementById("start-server");
      const START_LABEL = "Start Server";

      function showStatus(titleText, detailText, showRetry, showStart) {
        frame.classList.add("hidden");
        frame.src = "about:blank";
        status.classList.remove("hidden");
        title.textContent = titleText;
        detail.textContent = detailText;
        retry.classList.toggle("hidden", !showRetry);
        startBtn.classList.toggle("hidden", !showStart);
        startBtn.disabled = false;
        startBtn.textContent = START_LABEL;
      }

      function showFrame(url) {
        frame.src = url;
        frame.classList.remove("hidden");
        status.classList.add("hidden");
      }

      async function load() {
        showStatus("Connecting to Kiln server…", "Looking up the server URL from your settings.", false, false);
        if (!invoke) {
          showStatus(
            "Tauri bridge unavailable",
            "This page must run inside Kiln Desktop.",
            false,
            false
          );
          return;
        }
        try {
          const url = await invoke("get_kiln_url");
          if (!url) {
            showStatus(
              "Kiln server not running.",
              "Click Start Server to launch it, or start it from the tray menu.",
              true,
              true
            );
            return;
          }
          showFrame(url);
        } catch (err) {
          showStatus(
            "Could not reach Kiln server.",
            String(err || "Unknown error"),
            true,
            false
          );
        }
      }

      retry.addEventListener("click", load);

      async function startServerInline() {
        if (!invoke) {
          detail.textContent = "Tauri bridge unavailable.";
          return;
        }
        startBtn.disabled = true;
        startBtn.textContent = "Starting…";
        retry.classList.add("hidden");
        try {
          await invoke("start_server");
        } catch (err) {
          detail.textContent = String(err || "Failed to start server.");
          startBtn.disabled = false;
          startBtn.textContent = START_LABEL;
          retry.classList.remove("hidden");
          return;
        }
        const deadline = Date.now() + 10000;
        while (Date.now() < deadline) {
          await new Promise((r) => setTimeout(r, 500));
          try {
            const url = await invoke("get_kiln_url");
            if (url) {
              showFrame(url);
              return;
            }
          } catch (_) {
            // keep polling
          }
        }
        detail.textContent = "Server did not come up in time. Check the log viewer.";
        startBtn.disabled = false;
        startBtn.textContent = START_LABEL;
        retry.classList.remove("hidden");
      }

      startBtn.addEventListener("click", startServerInline);

      const copyBtn = document.getElementById("copy-url");
      const COPY_LABEL = "Copy OpenAI base URL";
      let copyResetTimer = null;

      function flashCopyBtn(label, cls) {
        if (copyResetTimer) {
          clearTimeout(copyResetTimer);
          copyResetTimer = null;
        }
        copyBtn.textContent = label;
        copyBtn.classList.remove("flash", "flash-warn");
        if (cls) copyBtn.classList.add(cls);
        copyResetTimer = setTimeout(() => {
          copyBtn.textContent = COPY_LABEL;
          copyBtn.classList.remove("flash", "flash-warn");
          copyResetTimer = null;
        }, 1500);
      }

      async function copyOpenAiBaseUrl() {
        if (!invoke) {
          flashCopyBtn("Tauri bridge unavailable", "flash-warn");
          return;
        }
        try {
          const url = await invoke("get_openai_base_url");
          if (!url) {
            flashCopyBtn("Server not running", "flash-warn");
            return;
          }
          try {
            await navigator.clipboard.writeText(url);
            flashCopyBtn("Copied!", "flash");
          } catch (err) {
            flashCopyBtn("Copy failed", "flash-warn");
            console.error("clipboard.writeText failed", err);
          }
        } catch (err) {
          flashCopyBtn("Copy failed", "flash-warn");
          console.error("get_openai_base_url failed", err);
        }
      }

      copyBtn.addEventListener("click", copyOpenAiBaseUrl);

      const logsBtn = document.getElementById("open-logs");
      const settingsBtn = document.getElementById("open-settings");
      logsBtn.addEventListener("click", async () => {
        try { await invoke("open_logs"); } catch (e) { console.error("open_logs failed", e); }
      });
      settingsBtn.addEventListener("click", async () => {
        try { await invoke("open_settings"); } catch (e) { console.error("open_settings failed", e); }
      });

      window.addEventListener("DOMContentLoaded", load);
    </script>
  </body>
</html>

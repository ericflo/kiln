<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kiln Dashboard</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0f1115;
        color: #e6e6e6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      #frame {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #0f1115;
      }
      #status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
        text-align: center;
        background: #0f1115;
      }
      #status h1 {
        font-size: 18px;
        margin: 0 0 8px 0;
        font-weight: 600;
      }
      #status p {
        margin: 4px 0;
        color: #a8aeb8;
        font-size: 14px;
        max-width: 440px;
      }
      #status code {
        background: #1b1e24;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
      button {
        margin-top: 16px;
        background: #2a6df4;
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover { background: #3b7af5; }
      button:disabled { background: #2a2f3a; cursor: default; }
      .hidden { display: none !important; }
      #status-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      #toolbar {
        position: absolute;
        top: 8px;
        right: 12px;
        display: flex;
        gap: 8px;
        z-index: 10;
      }
      #toolbar button {
        margin-top: 0;
        background: #1b1e24;
        color: #d8dbe2;
        border: 1px solid #2a2f3a;
        padding: 6px 10px;
        font-size: 12px;
      }
      #toolbar button:hover { background: #232831; }
      #toolbar button#stop-server:hover { background: #5a2424; border-color: #7a3232; color: #f2d6d6; }
      #toolbar button#stop-server:disabled { background: #2a2f3a; color: #6c7280; cursor: default; }
      #toolbar button#restart-server:hover { background: #3a4a6a; border-color: #4a5a7a; color: #d6e0f2; }
      #toolbar button#restart-server:disabled { background: #2a2f3a; color: #6c7280; cursor: default; }
      #toolbar .toolbar-divider {
        width: 1px;
        align-self: stretch;
        background: #2a2f3a;
        margin: 2px 4px;
      }
      #stop-server.flash-warn { background: #5a3324; border-color: #7a432f; color: #f2ddd6; }
      #restart-server.flash-warn { background: #5a3324; border-color: #7a432f; color: #f2ddd6; }
      #copy-url.flash { background: #245a32; border-color: #2f7a43; color: #d6f2dd; }
      #copy-url.flash-warn { background: #5a3324; border-color: #7a432f; color: #f2ddd6; }
      #check-updates-btn.flash { background: #245a32; border-color: #2f7a43; color: #d6f2dd; }
      #check-updates-btn.flash-warn { background: #5a3324; border-color: #7a432f; color: #f2ddd6; }
      #check-updates-btn:disabled { background: #2a2f3a; color: #6c7280; cursor: default; }
      #status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 12px;
        background: #1b1e24;
        color: #a8aeb8;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        user-select: none;
      }
      #status-badge .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6c7280;
        flex-shrink: 0;
      }
      #status-badge.state-stopped .dot { background: #6c7280; }
      #status-badge.state-starting .dot { background: #d4a64a; }
      #status-badge.state-running .dot { background: #2f9e44; }
      #status-badge.state-training .dot { background: #2a6df4; }
      #status-badge.state-error .dot { background: #e03131; }
      #status-badge.state-unknown .dot { background: #6c7280; }
      #base-url {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        font-size: 12px;
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
        background: #1b1e24;
        color: #a8aeb8;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        user-select: text;
        cursor: text;
        max-width: 280px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #base-url.empty {
        color: #6c7280;
        font-family: inherit;
        user-select: none;
        cursor: default;
      }
      #model-path-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 12px;
        background: #1b1e24;
        color: #a8aeb8;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        max-width: 280px;
        overflow: hidden;
      }
      #model-path-pill .model-label {
        color: #6c7280;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        flex-shrink: 0;
      }
      #model-path {
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
        background: transparent;
        padding: 0;
        font-size: 12px;
        color: inherit;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        user-select: text;
        min-width: 0;
      }
      #model-path.empty {
        color: #6c7280;
        font-family: inherit;
        user-select: none;
      }
      #vram-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 12px;
        background: #1b1e24;
        color: #a8aeb8;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        overflow: hidden;
      }
      #vram-pill .vram-label {
        color: #6c7280;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        flex-shrink: 0;
      }
      #vram-value {
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
        background: transparent;
        padding: 0;
        font-size: 12px;
        color: inherit;
        white-space: nowrap;
        user-select: text;
      }
      #vram-value.empty {
        color: #6c7280;
        font-family: inherit;
        user-select: none;
      }
      #adapter-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 12px;
        background: #1b1e24;
        color: #a8aeb8;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        max-width: 220px;
        overflow: hidden;
      }
      #adapter-pill .adapter-label {
        color: #6c7280;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        flex-shrink: 0;
      }
      #adapter-name {
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
        background: transparent;
        padding: 0;
        font-size: 12px;
        color: inherit;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        user-select: text;
        min-width: 0;
      }
      #adapter-name.empty {
        color: #6c7280;
        font-family: inherit;
        user-select: none;
      }
      #training-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 12px;
        background: #1b1e24;
        color: #a8aeb8;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        max-width: 260px;
        overflow: hidden;
      }
      #training-pill .training-label {
        color: #6c7280;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        flex-shrink: 0;
      }
      #training-value {
        font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", "Courier New", monospace;
        background: transparent;
        padding: 0;
        font-size: 12px;
        color: inherit;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        user-select: text;
        min-width: 0;
      }
      #training-value.empty {
        color: #6c7280;
        font-family: inherit;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <span id="status-badge" class="state-unknown" title="Kiln server state">
        <span class="dot"></span>
        <span class="label">Unknown</span>
      </span>
      <span id="model-path-pill" title="Configured model path — not set">
        <span class="model-label">Model:</span>
        <code id="model-path" class="empty">—</code>
      </span>
      <code id="base-url" class="empty" title="OpenAI base URL — server not running">—</code>
      <span id="vram-pill" title="Model / Total VRAM — server not running">
        <span class="vram-label">VRAM:</span>
        <code id="vram-value" class="empty">—</code>
      </span>
      <span id="adapter-pill" title="Active LoRA adapter — none">
        <span class="adapter-label">Adapter:</span>
        <code id="adapter-name" class="empty">—</code>
      </span>
      <span id="training-pill" title="Training status — server not running">
        <span class="training-label">Training:</span>
        <code id="training-value" class="empty">—</code>
      </span>
      <span class="toolbar-divider" aria-hidden="true"></span>
      <button id="copy-url" title="Copy the OpenAI-compatible base URL for this server (Ctrl/Cmd+Shift+C)">Copy OpenAI base URL</button>
      <button id="stop-server" class="hidden" title="Stop the running kiln server">Stop Server</button>
      <button id="restart-server" class="hidden" title="Restart the kiln server (Ctrl/Cmd+Shift+R)">Restart Server</button>
      <button id="open-logs" title="Open the log viewer window (Ctrl/Cmd+L)">View Logs</button>
      <button id="open-settings" title="Open the settings window (Ctrl/Cmd+,)">Settings</button>
      <button id="check-updates-btn" title="Check for an updated version of Kiln Desktop">Check for Updates</button>
    </div>
    <iframe id="frame" class="hidden" title="Kiln UI"></iframe>
    <div id="status">
      <h1 id="status-title">Connecting to Kiln server…</h1>
      <p id="status-detail">Looking up the server URL from your settings.</p>
      <div id="status-actions">
        <button id="start-server" class="hidden">Start Server</button>
        <button id="retry" class="hidden">Retry</button>
      </div>
    </div>
    <script>
      const invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)
        || (window.__TAURI__ && window.__TAURI__.invoke);

      const frame = document.getElementById("frame");
      const status = document.getElementById("status");
      const title = document.getElementById("status-title");
      const detail = document.getElementById("status-detail");
      const retry = document.getElementById("retry");
      const startBtn = document.getElementById("start-server");
      const START_LABEL = "Start Server";

      function showStatus(titleText, detailText, showRetry, showStart) {
        frame.classList.add("hidden");
        frame.src = "about:blank";
        status.classList.remove("hidden");
        title.textContent = titleText;
        detail.textContent = detailText;
        retry.classList.toggle("hidden", !showRetry);
        startBtn.classList.toggle("hidden", !showStart);
        startBtn.disabled = false;
        startBtn.textContent = START_LABEL;
      }

      function showFrame(url) {
        frame.src = url;
        frame.classList.remove("hidden");
        status.classList.add("hidden");
      }

      async function load() {
        showStatus("Connecting to Kiln server…", "Looking up the server URL from your settings.", false, false);
        if (!invoke) {
          showStatus(
            "Tauri bridge unavailable",
            "This page must run inside Kiln Desktop.",
            false,
            false
          );
          return;
        }
        try {
          const url = await invoke("get_kiln_url");
          if (!url) {
            showStatus(
              "Kiln server not running.",
              "Click Start Server to launch it, or start it from the tray menu.",
              true,
              true
            );
            return;
          }
          showFrame(url);
        } catch (err) {
          showStatus(
            "Could not reach Kiln server.",
            String(err || "Unknown error"),
            true,
            false
          );
        }
      }

      retry.addEventListener("click", load);

      async function startServerInline() {
        if (!invoke) {
          detail.textContent = "Tauri bridge unavailable.";
          return;
        }
        startBtn.disabled = true;
        startBtn.textContent = "Starting…";
        retry.classList.add("hidden");
        try {
          await invoke("start_server");
        } catch (err) {
          detail.textContent = String(err || "Failed to start server.");
          startBtn.disabled = false;
          startBtn.textContent = START_LABEL;
          retry.classList.remove("hidden");
          return;
        }
        const deadline = Date.now() + 10000;
        while (Date.now() < deadline) {
          await new Promise((r) => setTimeout(r, 500));
          try {
            const url = await invoke("get_kiln_url");
            if (url) {
              showFrame(url);
              return;
            }
          } catch (_) {
            // keep polling
          }
        }
        detail.textContent = "Server did not come up in time. Check the log viewer.";
        startBtn.disabled = false;
        startBtn.textContent = START_LABEL;
        retry.classList.remove("hidden");
      }

      startBtn.addEventListener("click", startServerInline);

      const copyBtn = document.getElementById("copy-url");
      const COPY_LABEL = "Copy OpenAI base URL";
      let copyResetTimer = null;

      function flashCopyBtn(label, cls) {
        if (copyResetTimer) {
          clearTimeout(copyResetTimer);
          copyResetTimer = null;
        }
        copyBtn.textContent = label;
        copyBtn.classList.remove("flash", "flash-warn");
        if (cls) copyBtn.classList.add(cls);
        copyResetTimer = setTimeout(() => {
          copyBtn.textContent = COPY_LABEL;
          copyBtn.classList.remove("flash", "flash-warn");
          copyResetTimer = null;
        }, 1500);
      }

      async function copyOpenAiBaseUrl() {
        if (!invoke) {
          flashCopyBtn("Tauri bridge unavailable", "flash-warn");
          return;
        }
        try {
          const url = await invoke("get_openai_base_url");
          if (!url) {
            flashCopyBtn("Server not running", "flash-warn");
            return;
          }
          try {
            await navigator.clipboard.writeText(url);
            flashCopyBtn("Copied!", "flash");
          } catch (err) {
            flashCopyBtn("Copy failed", "flash-warn");
            console.error("clipboard.writeText failed", err);
          }
        } catch (err) {
          flashCopyBtn("Copy failed", "flash-warn");
          console.error("get_openai_base_url failed", err);
        }
      }

      copyBtn.addEventListener("click", copyOpenAiBaseUrl);

      const logsBtn = document.getElementById("open-logs");
      const settingsBtn = document.getElementById("open-settings");
      logsBtn.addEventListener("click", async () => {
        try { await invoke("open_logs"); } catch (e) { console.error("open_logs failed", e); }
      });
      settingsBtn.addEventListener("click", async () => {
        try { await invoke("open_settings"); } catch (e) { console.error("open_settings failed", e); }
      });

      const stopBtn = document.getElementById("stop-server");
      const STOP_LABEL = "Stop Server";
      const STOP_ACTIVE_STATES = ["Starting", "Running", "TrainingActive"];
      let stopResetTimer = null;

      function flashStopBtn(label, cls, durationMs) {
        if (stopResetTimer) {
          clearTimeout(stopResetTimer);
          stopResetTimer = null;
        }
        stopBtn.textContent = label;
        stopBtn.classList.remove("flash-warn");
        if (cls) stopBtn.classList.add(cls);
        stopResetTimer = setTimeout(() => {
          stopBtn.textContent = STOP_LABEL;
          stopBtn.classList.remove("flash-warn");
          stopBtn.disabled = false;
          stopResetTimer = null;
        }, durationMs || 1500);
      }

      async function stopServer() {
        if (!invoke) {
          flashStopBtn("Stop failed", "flash-warn");
          return;
        }
        stopBtn.disabled = true;
        stopBtn.textContent = "Stopping…";
        try {
          await invoke("stop_server");
        } catch (err) {
          console.warn("stop_server failed", err);
          flashStopBtn("Stop failed", "flash-warn");
        }
      }

      stopBtn.addEventListener("click", stopServer);

      const restartBtn = document.getElementById("restart-server");
      const RESTART_LABEL = "Restart Server";
      const RESTART_ACTIVE_STATES = ["Running", "TrainingActive", "Error"];
      let restartResetTimer = null;

      function flashRestartBtn(label, cls, durationMs) {
        if (restartResetTimer) {
          clearTimeout(restartResetTimer);
          restartResetTimer = null;
        }
        restartBtn.textContent = label;
        restartBtn.classList.remove("flash-warn");
        if (cls) restartBtn.classList.add(cls);
        restartResetTimer = setTimeout(() => {
          restartBtn.textContent = RESTART_LABEL;
          restartBtn.classList.remove("flash-warn");
          restartBtn.disabled = false;
          restartResetTimer = null;
        }, durationMs || 1500);
      }

      async function restartServer() {
        if (!invoke) {
          flashRestartBtn("Restart failed", "flash-warn");
          return;
        }
        restartBtn.disabled = true;
        restartBtn.textContent = "Restarting…";
        try {
          await invoke("restart_server");
        } catch (err) {
          console.warn("restart_server failed", err);
          flashRestartBtn("Restart failed", "flash-warn");
        }
      }

      restartBtn.addEventListener("click", restartServer);

      document.addEventListener("keydown", (e) => {
        const mod = e.metaKey || e.ctrlKey;
        if (!mod) return;
        const target = e.target;
        if (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.isContentEditable)) {
          return;
        }
        const shift = e.shiftKey;
        const key = e.key;
        const lower = typeof key === "string" ? key.toLowerCase() : "";
        if (!shift && lower === "l") {
          e.preventDefault();
          invoke("open_logs").catch((err) => console.error("open_logs failed", err));
        } else if (!shift && key === ",") {
          e.preventDefault();
          invoke("open_settings").catch((err) => console.error("open_settings failed", err));
        } else if (shift && lower === "c") {
          e.preventDefault();
          copyOpenAiBaseUrl();
        } else if (shift && lower === "r") {
          e.preventDefault();
          if (RESTART_ACTIVE_STATES.includes(currentKind)) {
            restartServer();
          }
        }
      });

      const statusBadge = document.getElementById("status-badge");
      const statusBadgeLabel = statusBadge.querySelector(".label");
      const STATE_CLASSES = [
        "state-stopped",
        "state-starting",
        "state-running",
        "state-training",
        "state-error",
        "state-unknown",
      ];
      const STATE_INFO = {
        Stopped: { cls: "state-stopped", label: "Stopped" },
        Starting: { cls: "state-starting", label: "Starting" },
        Running: { cls: "state-running", label: "Running" },
        TrainingActive: { cls: "state-training", label: "Training" },
        Error: { cls: "state-error", label: "Error" },
        Unknown: { cls: "state-unknown", label: "Unknown" },
      };
      const UPTIME_STATES = ["Running", "TrainingActive"];
      const FRAMED_STATES = ["Running", "TrainingActive"];
      let runningSinceMs = null;
      let currentKind = null;
      let currentTooltip = null;
      let lastFramedKind = null;

      function formatUptime(ms) {
        const totalSec = Math.max(0, Math.floor(ms / 1000));
        if (totalSec < 60) return `${totalSec}s`;
        const totalMin = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        if (totalMin < 60) return sec > 0 ? `${totalMin}m ${sec}s` : `${totalMin}m`;
        const totalHr = Math.floor(totalMin / 60);
        const min = totalMin % 60;
        if (totalHr < 24) return min > 0 ? `${totalHr}h ${min}m` : `${totalHr}h`;
        const day = Math.floor(totalHr / 24);
        const hr = totalHr % 24;
        return hr > 0 ? `${day}d ${hr}h` : `${day}d`;
      }

      function applyStatusBadge(kind, tooltip) {
        const info = STATE_INFO[kind] || STATE_INFO.Unknown;
        statusBadge.classList.remove(...STATE_CLASSES);
        statusBadge.classList.add(info.cls);
        if (UPTIME_STATES.includes(kind)) {
          if (runningSinceMs === null) runningSinceMs = Date.now();
          const elapsed = Date.now() - runningSinceMs;
          statusBadgeLabel.textContent = `${info.label} · ${formatUptime(elapsed)}`;
        } else {
          runningSinceMs = null;
          statusBadgeLabel.textContent = info.label;
        }
        currentKind = kind;
        currentTooltip = tooltip || null;
        statusBadge.title = tooltip || `Kiln server state: ${info.label}`;
      }

      function tickUptime() {
        if (currentKind && UPTIME_STATES.includes(currentKind)) {
          applyStatusBadge(currentKind, currentTooltip);
        }
      }

      function parseServerState(state) {
        if (typeof state === "string") {
          return { kind: state, message: null };
        }
        if (state && typeof state === "object") {
          if (typeof state.kind === "string") {
            return { kind: state.kind, message: state.message || null };
          }
          const keys = Object.keys(state);
          if (keys.length > 0) {
            const k = keys[0];
            const v = state[k];
            return { kind: k, message: typeof v === "string" ? v : null };
          }
        }
        return { kind: "Unknown", message: null };
      }

      const baseUrlEl = document.getElementById("base-url");
      const BASE_URL_EMPTY_LABEL = "—";
      const BASE_URL_EMPTY_TITLE = "OpenAI base URL — server not running";
      let cachedBaseUrl = null;

      function setBaseUrl(url) {
        if (url) {
          baseUrlEl.textContent = url;
          baseUrlEl.title = url;
          baseUrlEl.classList.remove("empty");
        } else {
          baseUrlEl.textContent = BASE_URL_EMPTY_LABEL;
          baseUrlEl.title = BASE_URL_EMPTY_TITLE;
          baseUrlEl.classList.add("empty");
        }
      }

      async function refreshBaseUrl(kind) {
        if (!invoke || kind !== "Running") {
          if (cachedBaseUrl !== null) {
            cachedBaseUrl = null;
            setBaseUrl(null);
          }
          return;
        }
        try {
          const url = await invoke("get_openai_base_url");
          if (url && url !== cachedBaseUrl) {
            cachedBaseUrl = url;
            setBaseUrl(url);
          } else if (!url && cachedBaseUrl !== null) {
            cachedBaseUrl = null;
            setBaseUrl(null);
          }
        } catch (err) {
          if (cachedBaseUrl !== null) {
            cachedBaseUrl = null;
            setBaseUrl(null);
          }
        }
      }

      const vramPill = document.getElementById("vram-pill");
      const vramValueEl = document.getElementById("vram-value");
      const VRAM_EMPTY_LABEL = "—";
      const VRAM_EMPTY_TITLE = "Model / Total VRAM — server not running";
      let cachedVramText = null;

      function setVramDisplay(text, tooltip) {
        if (text) {
          vramValueEl.textContent = text;
          vramValueEl.classList.remove("empty");
          vramPill.title = tooltip || `Model / Total VRAM: ${text}`;
        } else {
          vramValueEl.textContent = VRAM_EMPTY_LABEL;
          vramValueEl.classList.add("empty");
          vramPill.title = VRAM_EMPTY_TITLE;
        }
      }

      async function refreshVramInfo(kind, baseUrl) {
        if (kind !== "Running" || !baseUrl) {
          if (cachedVramText !== null) {
            cachedVramText = null;
            setVramDisplay(null, null);
          }
          return;
        }
        const cfgUrl = baseUrl.replace(/\/v1$/, "") + "/v1/config";
        try {
          const resp = await fetch(cfgUrl, { cache: "no-store" });
          if (!resp.ok) throw new Error(`status ${resp.status}`);
          const cfg = await resp.json();
          const budget = cfg && cfg.memory_budget;
          const vramInfo = cfg && cfg.vram;
          if (!budget || typeof budget.total_vram_gb !== "number" || typeof budget.model_gb !== "number") {
            throw new Error("missing memory_budget fields");
          }
          const text = `${budget.model_gb.toFixed(1)} / ${budget.total_vram_gb.toFixed(1)} GB`;
          const sourceLabel = vramInfo && vramInfo.source ? vramInfo.source : "unknown";
          const tooltip = `Model / Total VRAM: ${text} (source: ${sourceLabel})`;
          if (text !== cachedVramText) {
            cachedVramText = text;
            setVramDisplay(text, tooltip);
          } else {
            vramPill.title = tooltip;
          }
        } catch (err) {
          if (cachedVramText !== null) {
            cachedVramText = null;
            setVramDisplay(null, null);
          }
        }
      }

      const adapterPill = document.getElementById("adapter-pill");
      const adapterNameEl = document.getElementById("adapter-name");
      const ADAPTER_EMPTY_LABEL = "—";
      const ADAPTER_EMPTY_TITLE = "Active LoRA adapter — none";
      const ADAPTER_VISIBLE_STATES = ["Starting", "Running", "TrainingActive"];
      let cachedAdapterText = null;

      function setAdapterDisplay(text, tooltip, isEmptyStyle) {
        adapterNameEl.textContent = text;
        if (isEmptyStyle) {
          adapterNameEl.classList.add("empty");
        } else {
          adapterNameEl.classList.remove("empty");
        }
        adapterPill.title = tooltip;
      }

      function clearAdapterDisplay() {
        if (cachedAdapterText !== null) {
          cachedAdapterText = null;
          setAdapterDisplay(ADAPTER_EMPTY_LABEL, ADAPTER_EMPTY_TITLE, true);
        }
      }

      async function refreshAdapterInfo(kind) {
        if (!invoke || !ADAPTER_VISIBLE_STATES.includes(kind)) {
          clearAdapterDisplay();
          return;
        }
        let info;
        try {
          info = await invoke("get_active_adapter");
        } catch (_) {
          clearAdapterDisplay();
          return;
        }
        if (info && info.active) {
          const text = info.active;
          if (text !== cachedAdapterText) {
            cachedAdapterText = text;
            setAdapterDisplay(text, `Active LoRA adapter: ${text}`, false);
          }
        } else if (info && info.available_count > 0) {
          const text = "none";
          if (text !== cachedAdapterText) {
            cachedAdapterText = text;
            setAdapterDisplay(
              text,
              `No LoRA adapter loaded (${info.available_count} available on disk)`,
              false
            );
          }
        } else {
          clearAdapterDisplay();
        }
      }

      const trainingPill = document.getElementById("training-pill");
      const trainingValueEl = document.getElementById("training-value");
      const TRAINING_EMPTY_LABEL = "—";
      const TRAINING_EMPTY_TITLE = "Training status — server not running";
      const TRAINING_IDLE_TITLE = "No training jobs";
      const TRAINING_VISIBLE_STATES = ["Starting", "Running", "TrainingActive"];
      let cachedTrainingText = null;

      function setTrainingDisplay(text, tooltip, isEmptyStyle) {
        trainingValueEl.textContent = text;
        if (isEmptyStyle) {
          trainingValueEl.classList.add("empty");
        } else {
          trainingValueEl.classList.remove("empty");
        }
        trainingPill.title = tooltip;
      }

      function clearTrainingDisplay() {
        if (cachedTrainingText !== null) {
          cachedTrainingText = null;
          setTrainingDisplay(TRAINING_EMPTY_LABEL, TRAINING_EMPTY_TITLE, true);
        }
      }

      function formatTrainingText(active) {
        const stateRaw = (active.state || "").toString();
        const stateLabel = stateRaw
          ? stateRaw.charAt(0).toUpperCase() + stateRaw.slice(1).toLowerCase()
          : "Unknown";
        const parts = [stateLabel];
        if (typeof active.progress === "number" && isFinite(active.progress)) {
          const pct = Math.max(0, Math.min(100, active.progress * 100));
          parts.push(`${pct.toFixed(0)}%`);
        }
        let text = parts.join(" ");
        if (typeof active.current_loss === "number" && isFinite(active.current_loss)) {
          text += ` (loss ${active.current_loss.toFixed(2)})`;
        }
        return text;
      }

      async function refreshTrainingInfo(kind) {
        if (!invoke || !TRAINING_VISIBLE_STATES.includes(kind)) {
          clearTrainingDisplay();
          return;
        }
        let info;
        try {
          info = await invoke("get_training_status");
        } catch (_) {
          clearTrainingDisplay();
          return;
        }
        if (info && info.active) {
          const text = formatTrainingText(info.active);
          const tooltipBits = [`Training job ${info.active.job_id}`];
          if (info.active.adapter_name) {
            tooltipBits.push(`adapter: ${info.active.adapter_name}`);
          }
          if (typeof info.total_jobs === "number" && info.total_jobs > 1) {
            tooltipBits.push(`${info.total_jobs} total jobs`);
          }
          const tooltip = tooltipBits.join(" — ");
          if (text !== cachedTrainingText) {
            cachedTrainingText = text;
            setTrainingDisplay(text, tooltip, false);
          } else {
            trainingPill.title = tooltip;
          }
        } else {
          const text = "idle";
          const tooltip =
            info && typeof info.total_jobs === "number" && info.total_jobs > 0
              ? `${info.total_jobs} training jobs — none running`
              : TRAINING_IDLE_TITLE;
          if (text !== cachedTrainingText) {
            cachedTrainingText = text;
            setTrainingDisplay(text, tooltip, false);
          } else {
            trainingPill.title = tooltip;
          }
        }
      }

      function updateStopBtnVisibility(kind) {
        const shouldShow = STOP_ACTIVE_STATES.includes(kind);
        stopBtn.classList.toggle("hidden", !shouldShow);
        if (!shouldShow && !stopResetTimer) {
          stopBtn.disabled = false;
          stopBtn.textContent = STOP_LABEL;
        }
      }

      function updateRestartBtnVisibility(kind) {
        const shouldShow = RESTART_ACTIVE_STATES.includes(kind);
        restartBtn.classList.toggle("hidden", !shouldShow);
        if (!shouldShow && !restartResetTimer) {
          restartBtn.disabled = false;
          restartBtn.textContent = RESTART_LABEL;
        }
      }

      let stateFailureLogged = false;
      async function pollServerState() {
        if (!invoke) {
          applyStatusBadge("Unknown", "Tauri bridge unavailable");
          await refreshBaseUrl("Unknown");
          await refreshVramInfo("Unknown", null);
          await refreshAdapterInfo("Unknown");
          await refreshTrainingInfo("Unknown");
          updateStopBtnVisibility("Unknown");
          updateRestartBtnVisibility("Unknown");
          return;
        }
        try {
          const raw = await invoke("server_state");
          const { kind, message } = parseServerState(raw);
          const info = STATE_INFO[kind] || STATE_INFO.Unknown;
          const tooltip = message
            ? `Kiln server state: ${info.label} — ${message}`
            : `Kiln server state: ${info.label}`;
          const wasFramed = FRAMED_STATES.includes(lastFramedKind);
          const isFramed = FRAMED_STATES.includes(kind);
          if (wasFramed && !isFramed) {
            if (kind === "Error") {
              showStatus(
                "Kiln server stopped unexpectedly.",
                message || "The server exited. See View Logs for details.",
                true,
                false
              );
            } else if (kind === "Stopped") {
              showStatus(
                "Kiln server stopped.",
                "Click Start Server to launch it, or start it from the tray menu.",
                true,
                true
              );
            } else {
              showStatus(
                "Reconnecting to Kiln server…",
                message || "Waiting for the server to come back up.",
                true,
                false
              );
            }
          } else if (!wasFramed && isFramed) {
            await load();
          }
          lastFramedKind = kind;
          applyStatusBadge(kind, tooltip);
          await refreshBaseUrl(kind);
          await refreshVramInfo(kind, cachedBaseUrl);
          await refreshAdapterInfo(kind);
          await refreshTrainingInfo(kind);
          updateStopBtnVisibility(kind);
          updateRestartBtnVisibility(kind);
          stateFailureLogged = false;
        } catch (err) {
          applyStatusBadge("Unknown", "Could not read server state");
          await refreshBaseUrl("Unknown");
          await refreshVramInfo("Unknown", null);
          await refreshAdapterInfo("Unknown");
          await refreshTrainingInfo("Unknown");
          updateStopBtnVisibility("Unknown");
          updateRestartBtnVisibility("Unknown");
          if (!stateFailureLogged) {
            console.error("server_state poll failed", err);
            stateFailureLogged = true;
          }
        }
      }

      const modelPathEl = document.getElementById("model-path");
      const modelPathPill = document.getElementById("model-path-pill");
      const MODEL_EMPTY_LABEL = "—";
      const MODEL_EMPTY_TITLE = "Configured model path — not set";

      async function refreshModelPath() {
        if (!invoke) return;
        try {
          const settings = await invoke("get_settings");
          if (settings && settings.model_path) {
            modelPathEl.textContent = settings.model_path;
            modelPathEl.classList.remove("empty");
            modelPathPill.title = `Configured model path: ${settings.model_path}`;
          } else {
            modelPathEl.textContent = MODEL_EMPTY_LABEL;
            modelPathEl.classList.add("empty");
            modelPathPill.title = MODEL_EMPTY_TITLE;
          }
        } catch (err) {
          console.error("get_settings failed", err);
        }
      }

      window.addEventListener("focus", refreshModelPath);

      const checkUpdatesBtn = document.getElementById("check-updates-btn");
      const CHECK_UPDATES_LABEL = "Check for Updates";
      let checkUpdatesResetTimer = null;
      let updateCheckInFlight = false;

      function flashCheckUpdatesBtn(label, cls, durationMs) {
        if (checkUpdatesResetTimer) {
          clearTimeout(checkUpdatesResetTimer);
          checkUpdatesResetTimer = null;
        }
        checkUpdatesBtn.textContent = label;
        checkUpdatesBtn.classList.remove("flash", "flash-warn");
        if (cls) checkUpdatesBtn.classList.add(cls);
        checkUpdatesResetTimer = setTimeout(() => {
          checkUpdatesBtn.textContent = CHECK_UPDATES_LABEL;
          checkUpdatesBtn.classList.remove("flash", "flash-warn");
          checkUpdatesBtn.disabled = false;
          checkUpdatesResetTimer = null;
        }, durationMs || 3000);
      }

      async function triggerUpdateCheck() {
        if (updateCheckInFlight) return;
        if (!invoke) {
          flashCheckUpdatesBtn("Tauri bridge unavailable", "flash-warn");
          return;
        }
        updateCheckInFlight = true;
        if (checkUpdatesResetTimer) {
          clearTimeout(checkUpdatesResetTimer);
          checkUpdatesResetTimer = null;
        }
        checkUpdatesBtn.disabled = true;
        checkUpdatesBtn.textContent = "Checking…";
        checkUpdatesBtn.classList.remove("flash", "flash-warn");
        let result;
        try {
          result = await invoke("check_for_updates");
        } catch (err) {
          updateCheckInFlight = false;
          flashCheckUpdatesBtn("Check failed", "flash-warn");
          console.error("check_for_updates failed", err);
          return;
        }
        if (!result || !result.available) {
          updateCheckInFlight = false;
          flashCheckUpdatesBtn("Up to date", "flash");
          return;
        }
        const version = result.version || "(unknown)";
        const notes = (result.notes || "").trim();
        const promptLines = [`Version ${version} is available. Install and restart?`];
        if (notes) {
          const trimmed = notes.length > 400 ? notes.slice(0, 400) + "…" : notes;
          promptLines.push("", trimmed);
        }
        const proceed = window.confirm(promptLines.join("\n"));
        if (!proceed) {
          updateCheckInFlight = false;
          flashCheckUpdatesBtn(`v${version} available`, "flash", 4000);
          return;
        }
        checkUpdatesBtn.textContent = "Installing…";
        try {
          await invoke("install_update");
          // app.restart() should have terminated the process by now; if we
          // get here something went wrong.
          flashCheckUpdatesBtn("Restart pending…", "flash", 5000);
        } catch (err) {
          flashCheckUpdatesBtn("Install failed", "flash-warn");
          console.error("install_update failed", err);
        } finally {
          updateCheckInFlight = false;
        }
      }

      checkUpdatesBtn.addEventListener("click", triggerUpdateCheck);

      const tauriEvent = window.__TAURI__ && window.__TAURI__.event;
      if (tauriEvent && typeof tauriEvent.listen === "function") {
        tauriEvent.listen("menu://check-updates", () => {
          triggerUpdateCheck();
        }).catch((err) => {
          console.error("listen menu://check-updates failed", err);
        });
      }

      window.addEventListener("DOMContentLoaded", () => {
        load();
        pollServerState();
        refreshModelPath();
        setInterval(pollServerState, 2000);
        setInterval(tickUptime, 1000);
      });
    </script>
  </body>
</html>
